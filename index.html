<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>鎌倉【毎日在庫】</title>
<style>
:root{
  --bg:#f7f6f2;--surface:#fff;--border:#e4e2da;--border2:#ccc9c0;
  --text:#1c1b18;--text2:#6b6a64;--text3:#9e9c96;
  --green:#2c5f2e;--green-light:#eaf3de;--green-text:#3b6d11;
  --blue:#185fa5;--blue-light:#e6f1fb;--blue-bd:#85b7eb;
  --warn-bg:#fcebeb;--warn-bd:#f09595;--warn-text:#a32d2d;
  --amber-bg:#faeeda;--amber-text:#854f0b;
  --done-bg:#fffde6;--done-bd:#ffe082;
  --r:10px;
}
*{box-sizing:border-box;margin:0;padding:0;}
#passcode-screen{position:fixed;inset:0;background:var(--green);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;}
#passcode-screen h2{color:#fff;font-size:22px;font-weight:700;margin-bottom:8px;}
#passcode-screen p{color:rgba(255,255,255,.8);font-size:13px;margin-bottom:24px;text-align:center;}
#passcode-dots{display:flex;gap:16px;margin-bottom:24px;}
.pc-dot{width:18px;height:18px;border-radius:50%;background:rgba(255,255,255,.3);transition:background .2s;}
.pc-dot.filled{background:#fff;}
#passcode-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;width:240px;}
.pc-btn{height:64px;border-radius:16px;border:none;background:rgba(255,255,255,.15);color:#fff;font-size:24px;font-weight:700;cursor:pointer;font-family:inherit;transition:background .15s;}
.pc-btn:active{background:rgba(255,255,255,.35);}
#passcode-error{color:#ffcccc;font-size:13px;margin-top:12px;min-height:20px;font-weight:600;}
body{font-family:'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:100px;}
header{background:var(--green);color:#fff;padding:12px 16px 10px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:10;}
.header-left h1{font-size:11px;font-weight:500;opacity:.75;}
.header-left .hdate-top{font-size:12px;font-weight:600;opacity:.85;display:block;}
.header-left .hdate-bottom{font-size:16px;font-weight:700;display:block;white-space:nowrap;}
.header-right{display:flex;flex-direction:row;align-items:center;gap:4px;flex-wrap:wrap;justify-content:flex-end;}
.edit-toggle-btn{background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.4);color:#fff;font-size:12px;font-weight:600;padding:5px 11px;border-radius:20px;cursor:pointer;}
.edit-toggle-btn.active{background:#fff;color:var(--green);}
#sync-btn{background:rgba(0,0,0,.2);border:1.5px solid rgba(255,255,255,.5);color:#fff;font-size:12px;font-weight:600;padding:4px 10px;border-radius:20px;cursor:pointer;display:flex;align-items:center;gap:6px;white-space:nowrap;}
#sync-btn:active{opacity:.7;}
main{padding:12px;max-width:680px;margin:0 auto;}
.sec{font-size:10px;font-weight:700;color:var(--text3);letter-spacing:.08em;text-transform:uppercase;margin:16px 0 6px;}

/* 担当者 */
.staff-complete-row{display:flex;flex-wrap:wrap;align-items:center;gap:6px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:8px 12px;margin-bottom:4px;}
.staff-complete-row label{font-size:14px;font-weight:600;color:var(--text2);white-space:nowrap;}
.staff-complete-row input{width:110px;font-size:14px;padding:5px 8px;border:1px solid var(--border2);border-radius:6px;font-family:inherit;background:var(--surface);color:var(--text);}
.staff-complete-row input:focus{outline:none;border-color:var(--green);}
.complete-inline-btn{margin-left:auto;padding:7px 16px;background:var(--done-bg);border:1.5px solid var(--done-bd);border-radius:20px;font-family:inherit;font-size:14px;font-weight:700;color:#7a6000;cursor:pointer;white-space:nowrap;transition:background .2s;}
.complete-inline-btn:active{background:var(--done-bd);}

.force-complete-btn{background:#fff0f0;border:1.5px solid #e02020;color:#c00000;border-radius:20px;font-family:inherit;font-size:12px;font-weight:700;padding:5px 12px;cursor:pointer;white-space:nowrap;margin-top:4px;}
.force-complete-btn.confirm{background:#e02020;color:#fff;}

.complete-inline-btn.confirmed{background:var(--done-bd);color:#5a4000;pointer-events:none;}
.edit-inline-btn{display:none;}
.edit-action-row{display:flex;gap:8px;}
.edit-action-btn{flex:1;padding:11px 10px;border-radius:var(--r);font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;border:none;text-align:center;}
.edit-start-btn{background:var(--bg);border:1.5px solid var(--border2);color:var(--text2);}
.edit-start-btn:active{background:var(--border);}
.edit-done-btn{background:var(--done-bd);color:#5a4000;}
.edit-done-btn:active{opacity:.8;}
.edit-save-btn{background:#d0f0f8;border:1.5px solid #7dd4e8;color:#1a6f8a;border-radius:20px;font-family:inherit;font-size:14px;font-weight:700;padding:7px 16px;cursor:pointer;white-space:nowrap;transition:background .2s;}
.edit-save-btn:active{background:#b0e4f4;}

/* 数字インプット */
.num-input{width:58px;height:40px;font-size:18px;font-weight:700;text-align:center;border:1.5px solid var(--border2);border-radius:7px;background:var(--surface);color:var(--text);font-family:inherit;-moz-appearance:textfield;}
.num-input:focus{outline:none;border-color:var(--green);}
.num-input::-webkit-outer-spin-button,.num-input::-webkit-inner-spin-button{-webkit-appearance:none;}


/* 在庫のみ */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:6px;}
.item-row{display:flex;align-items:center;padding:9px 12px;border-bottom:1px solid var(--border);}
.item-row:last-child{border-bottom:none;}
.iname{flex:1;font-size:16px;font-weight:500;}
.iname-edit{flex:1;font-size:14px;padding:4px 8px;border:1.5px solid var(--green);border-radius:6px;font-family:inherit;}
.sort-btn{background:var(--surface);border:1px solid var(--border2);border-radius:5px;width:26px;height:26px;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0;flex-shrink:0;}
.sort-btn:active{background:var(--border);}
.sort-btns{display:flex;flex-direction:column;gap:2px;margin-right:4px;}
.del-btn{background:none;border:none;color:var(--warn-text);font-size:18px;cursor:pointer;padding:0 4px;margin-left:6px;}

/* 販売カード */
.sales-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);margin-bottom:8px;}
.sales-card.done-card{background:var(--done-bg);border-color:var(--done-bd);}
.sname-row{padding:9px 12px 7px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:6px;}
.sname{font-size:16px;font-weight:500;flex:1;}
.dbadge{font-size:11px;font-weight:700;padding:2px 7px;border-radius:20px;background:transparent;color:transparent;white-space:nowrap;}
.dbadge.ok{background:transparent;color:transparent;}
.dbadge.warn{background:var(--warn-bg);color:var(--warn-text);border:1px solid var(--warn-bd);}
.sinputs{display:flex;}
.scol{flex:1;padding:8px 6px;border-right:1px solid var(--border);display:flex;flex-direction:column;align-items:center;gap:5px;}
.scol:last-child{border-right:none;}
.clabel{font-size:12px;font-weight:700;color:var(--text3);letter-spacing:.04em;text-align:center;}

/* 入荷 */
.nyuka-toggle{display:flex;align-items:center;gap:6px;padding:7px 12px;border-top:1px solid var(--border);cursor:pointer;background:var(--bg);}
.nyuka-toggle .ntxt{font-size:11px;color:var(--blue);font-weight:600;}
.nyuka-toggle .ntotal{font-size:11px;color:var(--blue);margin-left:4px;}
.nyuka-toggle .arrow{font-size:10px;color:var(--text3);margin-left:auto;transition:transform .2s;}
.nyuka-toggle.open .arrow{transform:rotate(180deg);}
.nyuka-body{display:none;padding:9px 12px 11px;border-top:1px solid var(--border);background:#f0f7ff;}
.nyuka-body.show{display:block;}
.nyuka-item{display:flex;align-items:center;gap:8px;font-size:12px;padding:3px 0;}
.ndate{color:var(--blue);font-weight:600;min-width:68px;}
.nqty{font-weight:600;}
.nyuka-del{background:none;border:none;color:var(--warn-text);font-size:13px;cursor:pointer;padding:0 3px;}
.nyuka-form{display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin-top:7px;}
.nyuka-form input[type=date]{font-size:12px;padding:5px 7px;border:1px solid var(--blue-bd);border-radius:6px;background:var(--surface);color:var(--text);font-family:inherit;flex:1;min-width:110px;}
.nqty-input{width:64px;font-size:15px;font-weight:600;padding:5px 4px;border:1px solid var(--blue-bd);border-radius:6px;background:var(--surface);color:var(--text);font-family:inherit;text-align:center;-moz-appearance:textfield;}
.nqty-input::-webkit-outer-spin-button,.nqty-input::-webkit-inner-spin-button{-webkit-appearance:none;}
.nyuka-add-btn{padding:6px 12px;background:var(--blue);color:#fff;border:none;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;}

/* 品目追加行 */
.add-row{display:flex;gap:8px;align-items:center;padding:9px 12px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);margin-top:6px;}
.add-row input{flex:1;font-size:13px;padding:6px 9px;border:1.5px solid var(--border2);border-radius:7px;font-family:inherit;}
.add-row input:focus{outline:none;border-color:var(--green);}
.add-row-btn{padding:6px 12px;background:var(--green);color:#fff;border:none;border-radius:7px;font-size:13px;font-weight:600;cursor:pointer;}

/* 警告 */
.warn-box{display:none;}

@keyframes blink-hint{0%,100%{opacity:1;}50%{opacity:0.25;}}
@keyframes blink-red{0%,100%{opacity:1;}50%{opacity:0.2;}}
.staff-hint{animation:blink-red 1.2s ease-in-out infinite;color:#d00000;font-size:12px;font-weight:700;white-space:normal;width:100%;display:block;}
.nyuka-hint{display:none;}
.nyuka-inline-btn{animation:blink-hint 1.6s ease-in-out infinite;background:#e8f4ff;border:1.5px solid #7ab8f0;color:#1a5fa8;border-radius:12px;font-size:13px;font-weight:700;padding:3px 10px;cursor:pointer;white-space:nowrap;margin-left:6px;font-family:inherit;}
.nyuka-inline-btn:active{background:#c8e4ff;}

/* 備考 */
.note-wrap{margin-top:10px;}
.note-label{font-size:10px;font-weight:700;color:var(--text3);letter-spacing:.08em;margin-bottom:5px;}
.note-wrap textarea{width:100%;padding:9px 11px;border:1px solid var(--border2);border-radius:var(--r);background:var(--surface);color:var(--text);font-family:inherit;font-size:13px;resize:none;}
.note-wrap textarea::placeholder{color:var(--text3);}

/* 完了ボタン */


/* ボタン行 */
.btn-row{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap;}
.btn{flex:1;min-width:120px;padding:13px 10px;border-radius:var(--r);font-family:inherit;font-size:14px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;border:none;}
.btn-save{background:var(--green);color:#fff;}
.btn-save:active{opacity:.8;}
.btn-csv{background:var(--surface);color:var(--green);border:1.5px solid var(--green);}
.btn-reset{background:var(--surface);color:var(--text2);border:1px solid var(--border2);flex:none;padding:13px 16px;font-size:16px;}

/* 履歴 */
.hist-section{margin-top:22px;}
.hist-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.hist-header h2{font-size:13px;font-weight:600;color:var(--text2);}
.hist-count{font-size:12px;color:var(--text3);}
.hist-card-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;}
.hist-row{padding:12px 12px 10px;border-bottom:1px solid var(--border);}
.hist-row:last-child{border-bottom:none;}
.hist-meta{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:8px;}
.hist-date{font-size:16px;font-weight:700;color:var(--green);}
.hist-time{font-size:11px;color:var(--text3);background:var(--bg);padding:1px 6px;border-radius:10px;}
.hist-staff{font-size:11px;font-weight:600;color:var(--blue);background:var(--blue-light);padding:2px 8px;border-radius:20px;}
.hist-warn-badge{font-size:10px;color:var(--amber-text);background:var(--amber-bg);padding:2px 7px;border-radius:4px;margin-left:auto;}
.hist-edit-btn{display:none;}

/* 履歴テーブル */
.htbl{width:100%;border-collapse:collapse;font-size:12px;}
.htbl th{font-size:10px;font-weight:700;color:var(--text3);text-align:right;padding:3px 5px;border-bottom:1px solid var(--border);white-space:nowrap;}
.htbl th:first-child{text-align:left;}
.htbl td{padding:4px 5px;text-align:right;border-bottom:1px solid var(--border);color:var(--text2);white-space:nowrap;}
.htbl td:first-child{text-align:left;color:var(--text);font-weight:500;}
.htbl tr:last-child td{border-bottom:none;}
.htbl .stock-val{font-size:20px;font-weight:700;color:var(--blue);}
.htbl .diff-ok{color:var(--green-text);font-weight:600;}
.htbl .stock-low{color:#e02020!important;font-weight:700;}
.htbl .diff-warn{color:var(--amber-text);font-weight:600;}
.htbl-label{font-size:10px;font-weight:700;color:var(--text3);letter-spacing:.06em;margin:0 0 3px;}
.htbl-section{border:1px solid var(--border);border-radius:8px;padding:8px 10px;margin-bottom:10px;background:var(--bg);}
.hist-note{margin-top:7px;font-size:12px;color:var(--text2);background:var(--bg);padding:6px 9px;border-radius:6px;}
.hist-empty{padding:16px;font-size:13px;color:var(--text3);text-align:center;}
.diff-popup{display:none;background:#fffde6;border:1.5px solid #ffe082;border-radius:8px;padding:8px 12px;margin-top:6px;font-size:12px;color:#5a4000;}
.diff-popup.show{display:block;}
.diff-popup-row{padding:2px 0;line-height:1.7;}
.diff-arrow{color:var(--amber-text);font-weight:700;margin:0 4px;}
.diff-same{color:var(--text3);}
.hist-date-btn{background:none;border:none;font-size:16px;font-weight:700;color:var(--green);cursor:pointer;padding:0;display:flex;align-items:center;gap:4px;}
.hist-date-btn:active{opacity:.7;}
.diff-toggle-hint{font-size:10px;color:var(--text3);margin-left:2px;}

.share-btn{background:#e8f8f0;border:1.5px solid #7dd4a8;color:#2c5f2e;border-radius:14px;font-family:inherit;font-size:11px;font-weight:700;padding:4px 8px;cursor:pointer;white-space:nowrap;transition:background .2s;}
.share-btn:active{background:#c8f0d8;}
.line-share-btn{background:#06c755;border-color:#06c755;color:#fff;}
.line-share-btn:active{background:#059a42;}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:#1c1b18;color:#fff;padding:10px 20px;border-radius:24px;font-size:13px;pointer-events:none;transition:transform .3s;z-index:100;white-space:nowrap;}
.toast.show{transform:translateX(-50%) translateY(0);}


/* 今日リセットボタン */
.today-reset-btn{background:#fff8f0;border:1.5px solid #f5c087;color:#8a4a00;border-radius:14px;font-family:inherit;font-size:11px;font-weight:700;padding:4px 10px;cursor:pointer;white-space:nowrap;}
.today-reset-btn:active{background:#ffe8c8;}

/* 編集モード中の履歴ボタン */
.hist-edit-btn{background:#fff8e6;border:1px solid #ffe082;color:#7a6000;border-radius:12px;font-size:11px;font-weight:700;padding:3px 9px;cursor:pointer;}

@media(min-width:540px){main{padding:18px;}.item-row{padding:10px 14px;}.scol{padding:9px 10px;}}
</style>

</head>
<body>
<!-- ===== ステータス・バージョン表示ヘルパー ===== -->
<script>
// アプリバージョン（更新のたびにここを変更）
window.APP_VERSION = 'v9.4';

// ===== パスコード =====
const DEFAULT_PASSCODE = '1234'; // デフォルトパスコード
let pcBuffer = '';

function initPasscode(){
  const stored = localStorage.getItem('app_passcode') || DEFAULT_PASSCODE;
  const unlocked = sessionStorage.getItem('pc_unlocked');
  if(unlocked === stored){
    // 同じセッションで認証済み
    document.getElementById('passcode-screen').style.display='none';
    return;
  }
  document.getElementById('passcode-screen').style.display='flex';
  document.querySelector('header').style.display='none';
  document.querySelector('main').style.display='none';
}

function pcInput(n){
  if(pcBuffer.length>=4) return;
  pcBuffer += n;
  updateDots();
  if(pcBuffer.length===4) setTimeout(checkPasscode, 200);
}

function pcDelete(){
  pcBuffer = pcBuffer.slice(0,-1);
  updateDots();
}

function pcClear(){
  pcBuffer = '';
  updateDots();
}

function updateDots(){
  for(let i=0;i<4;i++){
    document.getElementById('d'+i).classList.toggle('filled', i<pcBuffer.length);
  }
}

function checkPasscode(){
  const stored = localStorage.getItem('app_passcode') || DEFAULT_PASSCODE;
  if(pcBuffer === stored){
    sessionStorage.setItem('pc_unlocked', stored);
    document.getElementById('passcode-screen').style.display='none';
    document.querySelector('header').style.display='';
    document.querySelector('main').style.display='';
  } else {
    document.getElementById('passcode-error').textContent='パスコードが違います';
    pcBuffer='';
    updateDots();
    setTimeout(()=>{ document.getElementById('passcode-error').textContent=''; },1500);
  }
}

// パスコード変更（設定から呼ぶ）
function changePasscode(){
  const np = prompt('新しいパスコード（4桁の数字）を入力してください');
  if(!np) return;
  if(!/^[0-9]{4}$/.test(np)){
    alert('4桁の数字で入力してください');
    return;
  }
  localStorage.setItem('app_passcode', np);
  sessionStorage.setItem('pc_unlocked', np);
  alert('パスコードを変更しました：' + np);
}
window.APP_UPDATED = '2026-05-27';

// setSyncStatus：DOM生成後も呼べるようキューイング方式
window._syncQueue = [];
window.setSyncStatus = function(state, detail){
  var dot   = document.getElementById('sync-dot');
  var label = document.getElementById('sync-label');
  if(!dot || !label){
    // DOM未生成ならキューに積んで後で実行
    window._syncQueue.push([state, detail]);
    return;
  }
  var map = {
    checking: { color:'#aaa',    text:'接続確認中…' },
    online:   { color:'#6ee06e', text:'🟢 同期済み' },
    offline:  { color:'#f5a623', text:'🟡 オフライン' },
    error:    { color:'#e05555', text:'🔴 接続エラー' },
    syncing:  { color:'#60b8f5', text:'🔄 同期中…' },
  };
  var s = map[state] || map['checking'];
  dot.style.background = s.color;
  label.textContent    = detail ? s.text + '　' + detail : s.text;
  var btn = document.getElementById('sync-btn');
  if(btn) btn.style.borderColor = s.color;
};
// DOM生成後にキューを消化
document.addEventListener('DOMContentLoaded', function(){
  // バージョン表示
  var vEl = document.getElementById('app-version');
  if(vEl) vEl.textContent = window.APP_VERSION + '　' + window.APP_UPDATED;
  // キューに積まれたステータスを実行
  (window._syncQueue||[]).forEach(function(args){ window.setSyncStatus(args[0], args[1]); });
  window._syncQueue = [];
});
// フォールバック
window.firebaseSave      = function(){};
window.firebaseSaveItems = function(){};
window.manualSync        = function(){
  if(typeof showToast==='function') showToast('⚠️ Firebase接続準備中です。少し待ってからお試しください。');
};
</script>

<!-- ===== Firebase ESモジュール（importmap + type="module"）===== -->
<script type="importmap">
{
  "imports": {
    "firebase/app":      "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js",
    "firebase/database": "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js"
  }
}
</script>
<script type="module">
import { initializeApp }                           from 'firebase/app';
import { getDatabase, ref, set, get, onValue }    from 'firebase/database';

const firebaseConfig = {
  apiKey:            "AIzaSyDt5MmHphP1PPjKtDq9ZgLMpbWbrQ_NtXs",
  authDomain:        "kamakura-zaiko-3bd31.firebaseapp.com",
  databaseURL:       "https://kamakura-zaiko-3bd31-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId:         "kamakura-zaiko-3bd31",
  storageBucket:     "kamakura-zaiko-3bd31.firebasestorage.app",
  messagingSenderId: "911334956899",
  appId:             "1:911334956899:web:30e1a31b2218a974b46f3a"
};

try {
  const app = initializeApp(firebaseConfig);
  const db  = getDatabase(app);

  // ── 接続状態をリアルタイム監視 ──
  onValue(ref(db, '.info/connected'), (snap) => {
    window.setSyncStatus(snap.val() === true ? 'online' : 'offline');
  });

  // ── 保存（履歴）──
  let _skipNextFirebaseSync = false; // 自分の書き込みによるonValueを無視するフラグ
  window.firebaseSave = function(history){
    _skipNextFirebaseSync = true; // 次のonValue受信をスキップ
    window.setSyncStatus('syncing');
    set(ref(db, 'zaiko/history'), history)
      .then(()  => { window.setSyncStatus('online'); })
      .catch((e)=> { window.setSyncStatus('error', e.code||''); console.error('保存失敗',e); });
  };

  // ── 保存（品目リスト）──
  window.firebaseSaveItems = function(items){
    _suppressItemsUpdate = true; // 自分の保存への反応を抑制
    set(ref(db, 'zaiko/items'), items)
      .catch((e)=> { console.error('品目保存失敗',e); _suppressItemsUpdate=false; });
  };

  // ── 品目リストをFirebaseから取得してローカルに反映するヘルパー ──
  let _suppressItemsUpdate = false; // 自分の保存に反応しないフラグ
  window._suppressItemsUpdate = function(val){ _suppressItemsUpdate = val; };
  function applyItemsFromFirebase(itemData){
    if(!itemData||!itemData.simple||!itemData.sales) return;
    // 自分の保存トリガーは無視
    if(_suppressItemsUpdate){ _suppressItemsUpdate=false; return; }
    // ローカルのlocalStorageを上書き
    localStorage.setItem('zaiko_items', JSON.stringify(itemData));
    // グローバル変数も更新
    if(typeof SIMPLE !== 'undefined'){
      SIMPLE.length = 0;
      itemData.simple.forEach(function(it){ SIMPLE.push(it); });
    }
    if(typeof SALES !== 'undefined'){
      SALES.length = 0;
      itemData.sales.forEach(function(it){
        SALES.push(it);
        if(typeof NYUKA !== 'undefined' && !NYUKA[it.id]) NYUKA[it.id]=[];
      });
    }
    // 品目編集モード中はUIをリセットしない
    if(typeof editMode !== 'undefined' && editMode) return;
    if(typeof renderAll==='function') renderAll();
  }

  // ── 手動再同期 ──
  window.manualSync = function(){
    window.setSyncStatus('syncing');
    // 品目リストと履歴を並行取得
    Promise.all([
      get(ref(db, 'zaiko/items')),
      get(ref(db, 'zaiko/history'))
    ]).then(([itemsSnap, histSnap]) => {
        // 品目リストを反映
        if(itemsSnap.val()) applyItemsFromFirebase(itemsSnap.val());
        // 履歴を反映
        const data = histSnap.val();
        if(data){
          localStorage.setItem('zaiko_history', JSON.stringify(data));
          if(typeof renderAll==='function') renderAll();
          if(typeof renderHistory==='function') renderHistory();
          if(typeof restoreLastValues==='function') restoreLastValues();
        }
        window.setSyncStatus('online');
        if(typeof showToast==='function') showToast('🔄 同期しました・データを復元しました');
      })
      .catch((e) => {
        window.setSyncStatus('error', e.code||'');
        if(typeof showToast==='function') showToast('❌ 同期失敗：'+(e.message||e.code||'不明なエラー'));
      });
  };

  // ── 品目リストのリアルタイム同期 ──
  onValue(ref(db, 'zaiko/items'), (snap) => {
    const itemData = snap.val();
    if(itemData) applyItemsFromFirebase(itemData);
  });

  // ── 初回ロード＆リアルタイム受信（履歴）──
  let firstLoad = true;
  onValue(ref(db, 'zaiko/history'), (snap) => {
    // 自分の書き込みによるコールバックはスキップ
    if(_skipNextFirebaseSync){ _skipNextFirebaseSync = false; return; }
    const data = snap.val();
    if(data){
      localStorage.setItem('zaiko_history', JSON.stringify(data));
      // renderAll を先に呼んでDOMを確実に作ってから値を流し込む
      if(typeof renderAll==='function') renderAll();
      if(typeof renderHistory==='function') renderHistory();
      if(typeof restoreLastValues==='function') restoreLastValues();
      if(firstLoad){
        if(typeof showToast==='function') showToast('✅ データを読み込みました');
        firstLoad = false;
      }
    } else if(firstLoad){
      // Firebaseにまだデータがない場合
      if(typeof showToast==='function') showToast('📭 Firebaseにデータがありません');
      firstLoad = false;
    }
    window.setSyncStatus('online');
  }, (err) => {
    console.error('Firebase読み取りエラー', err);
    window.setSyncStatus('error', err.code||'');
    // Firebase失敗時はlocalStorageで表示
    if(typeof renderHistory==='function') renderHistory();
    if(typeof restoreLastValues==='function') restoreLastValues();
  });

} catch(e) {
  console.error('Firebase初期化エラー', e);
  window.setSyncStatus('error', 'init');
}
</script>

<script>
// ===== データ =====
const DEFAULT_SIMPLE=[
  {id:'warabi-sheet',name:'わらび餅シート'},
  {id:'warabi-cut',name:'わらび餅カット'},
  {id:'kuromitsu',name:'黒蜜'},
  {id:'yogurt',name:'ヨーグルト'},
  {id:'milk',name:'牛乳'},
  {id:'matcha',name:'浅川園抹茶'},
];
const DEFAULT_SALES=[
  {id:'kama-solo',name:'釜揚げ（単品）'},
  {id:'kama-box',name:'釜揚げ（箱）'},
  {id:'stick',name:'スティック'},
  {id:'strap-ichigo',name:'ストラップ（苺）'},
  {id:'strap-coffee',name:'ストラップ（珈琲）'},
  {id:'strap-matcha',name:'ストラップ（抹茶）'},
];
function loadItems(){
  try{const s=localStorage.getItem('zaiko_items');if(s){const d=JSON.parse(s);return{simple:d.simple,sales:d.sales};}}catch(e){}
  return{simple:JSON.parse(JSON.stringify(DEFAULT_SIMPLE)),sales:JSON.parse(JSON.stringify(DEFAULT_SALES))};
}
function saveItems(){
  localStorage.setItem('zaiko_items',JSON.stringify({simple:SIMPLE,sales:SALES}));
  // Firebaseにも品目リストを保存
  if(window.firebaseSaveItems) window.firebaseSaveItems({simple:SIMPLE,sales:SALES});
}

let {simple:SIMPLE,sales:SALES}=loadItems();
const NYUKA={};
SALES.forEach(it=>{NYUKA[it.id]=[];});
let editMode=false;
let completed=false;
let UBER=[]; // Uber Eats売上リスト [{amount, time}]

// 在庫警告の閾値（品目名：閾値以下で赤表示）
const STOCK_WARN = {
  'わらび餅シート':2,'わらび餅カット':2,'黒蜜':3,'ヨーグルト':4,
  '牛乳':7,'浅川園抹茶':4,'きな粉':2,'釜揚げ箱':2,
  '釜揚げ単品':6,'スッテック':4,'ストラップ各種':1
};
function isLowStock(name, qty){
  for(const [k,v] of Object.entries(STOCK_WARN)){
    if(name.includes(k)) return qty<=v;
  }
  return false;
}
let editingDate=null; // 編集中の記録の日付

const now=new Date();
const dateStr=now.getFullYear()+'/'+(now.getMonth()+1).toString().padStart(2,'0')+'/'+now.getDate().toString().padStart(2,'0');
const todayISO=now.toISOString().slice(0,10);
document.getElementById('hdate-top').textContent=now.getFullYear()+'年'+(now.getMonth()+1)+'月';
document.getElementById('hdate-bottom').textContent=now.getDate()+'日（'+'日月火水木金土'[now.getDay()]+'）';

function uid(){return 'i'+Date.now().toString(36)+Math.random().toString(36).slice(2,5);}
function $v(id){const el=document.getElementById(id);return el?parseFloat(el.value)||0:0;}
function $set(id,v){const el=document.getElementById(id);if(el)el.value=Math.max(0,parseFloat(v)||0);}
function loadHistory(){try{return JSON.parse(localStorage.getItem('zaiko_history')||'[]');}catch(e){return[];}}
function saveHistory(h){
  localStorage.setItem('zaiko_history',JSON.stringify(h));
  // Firebaseにも保存
  if(window.firebaseSave) window.firebaseSave(h);
}

// 前日在庫取得（前日の入荷数を加算して翌日の期待在庫を返す）
function prevStock(id){
  const h=loadHistory();
  if(h.length<1)return null;
  // 今日の記録を除いた直近の記録を参照
  const prev=h.find(r=>r.date!==dateStr);
  if(!prev)return null;
  let stock=null;
  if(prev.sales&&prev.sales[id]!==undefined)stock=prev.sales[id];
  else if(prev.simple&&prev.simple[id]!==undefined)stock=prev.simple[id];
  if(stock===null)return null;
  // [修正] 差異あり強制保存の場合は保存した在庫数をそのままスタート値にする
  // （入荷加算なし）。正常保存の場合のみ前日入荷を加算する。
  if(prev.forceCompleted && prev.warnItems && prev.warnItems.includes(id)){
    return stock;
  }
  // 前日の入荷数を加算（翌日に反映されるべき在庫）
  const prevNyuka=(prev.nyuka&&prev.nyuka[id])||[];
  const prevNyukaTotal=prevNyuka.reduce((s,n)=>s+n.qty,0);
  return stock+prevNyukaTotal;
}

// ===== 完了確認 =====
let _forceConfirmStep=0; // 2回押し用カウンター
function confirmComplete(){
  // [修正] 担当者名は入力完了ボタン押下時にモーダルで入力する
  openStaffModal();
}
function openStaffModal(){
  const modal=document.getElementById('staff-modal');
  modal.style.display='flex';
  const inp=document.getElementById('staff-modal-input');
  // 前回の担当者名を復元
  const prev=document.getElementById('staff').value.trim();
  inp.value=prev||'';
  updateStaffListModal();
  setTimeout(()=>inp.focus(),100);
}
function closeStaffModal(){
  document.getElementById('staff-modal').style.display='none';
}
function updateStaffListModal(){
  const dl=document.getElementById('staff-list-modal');
  if(!dl)return;
  try{
    const list=JSON.parse(localStorage.getItem('zaiko_staff_history')||'[]');
    dl.innerHTML=list.map(n=>`<option value="${n.replace(/"/g,'&quot;')}">`).join('');
  }catch(e){}
}
function submitStaffModal(){
  const val=document.getElementById('staff-modal-input').value.trim();
  if(!val){
    document.getElementById('staff-modal-input').style.borderColor='#e02020';
    document.getElementById('staff-modal-input').placeholder='担当者名を入力してください';
    return;
  }
  document.getElementById('staff').value=val;
  saveStaffName();
  closeStaffModal();
  // 元のconfirmComplete処理を続行
  _doConfirmComplete();
}
function _doConfirmComplete(){
  const staff=document.getElementById('staff').value.trim();
  if(!staff){showToast('👤 担当者名を入力してください');return;}
  // 在庫不一致チェック
  // [修正] prevStock()は「前日在庫＋前日入荷」を返す。今日の入荷はaddNyuka()で在庫欄に加算済みのため
  // nyukaTotalを足すと二重加算になり誤警告が出る。expectedはprevStockのみで判定する。
  const warns=SALES.filter(it=>{
    const prev=prevStock(it.id);
    if(prev===null)return false;
    const stock=$v('stock_'+it.id),out=$v('sell_'+it.id)+$v('free_'+it.id);
    return(stock+out)!==prev;
  });
  // 差異があっても警告なしで保存
  if(warns.length) _isForceComplete=true;
  doComplete();
}
let _isForceComplete=false;
function doComplete(){
  completed=true;
  const btn=document.getElementById('complete-btn');
  btn.classList.add('confirmed');
  btn.textContent='✅ 保存済み';
  clearEdited();
  clearDraft(); // [修正] 正式保存後は下書きを削除
  doSave(true);
  _isForceComplete=false;
}



// 編集ボタン（履歴から）
function editRecord(idx){
  const h=loadHistory();
  const r=h[idx];
  if(!r)return;
  editingDate=r.date; // 編集中の日付を記憶
  // フォームに値を復元
  document.getElementById('staff').value=r.staff||'';
  document.getElementById('note').value=r.note||'';
  SIMPLE.forEach(it=>{$set('simple_'+it.id,r.simple[it.id]||0);});
  SALES.forEach(it=>{
    $set('stock_'+it.id,r.sales[it.id]||0);
    $set('sell_'+it.id,r.sales[it.id+'_sell']||0);
    $set('free_'+it.id,r.sales[it.id+'_free']||0);
    NYUKA[it.id]=(r.nyuka&&r.nyuka[it.id])?[...r.nyuka[it.id]]:[];
    renderNyuka(it.id);updateDiff(it.id);
  });
  // 完了状態を解除
  completed=false;
  const btn=document.getElementById('complete-btn');
  btn.classList.remove('confirmed');
  btn.textContent='✅ 入力完了・保存';
  clearEdited();
  checkStaffHint();
  window.scrollTo({top:0,behavior:'smooth'});
  showToast('✏️ 編集モード：修正後に保存してください');
}

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function fmtDate(d){
  if(!d)return d;
  const p=d.split('/');
  if(p.length===3)return p[0]+'/'+parseInt(p[1])+'/'+parseInt(p[2]);
  return d;
}

// ===== 品目追加・削除 =====
function checkSimpleLow(id){
  const it=SIMPLE.find(x=>x.id===id);
  const el=document.getElementById('simple_'+id);
  if(!it||!el) return;
  const qty=$v('simple_'+id);
  if(isLowStock(it.name,qty)){el.style.color='#e02020';el.style.fontWeight='700';}
  else{el.style.color='';el.style.fontWeight='';}
}

function moveItem(type, idx, dir){
  const arr = type==='simple' ? SIMPLE : SALES;
  const newIdx = idx + dir;
  if(newIdx < 0 || newIdx >= arr.length) return;
  const tmp = arr[idx]; arr[idx] = arr[newIdx]; arr[newIdx] = tmp;
  saveItems();
  if(type==='simple') renderSimple(); else renderSales();
  restoreLastValues();
}

function addSimple(){const inp=document.getElementById('new-simple-name');const name=inp.value.trim();if(!name){showToast('品目名を入力してください');return;}SIMPLE.push({id:uid(),name});saveItems();inp.value='';renderSimple();restoreLastValues();showToast('追加しました');}
function delSimple(id){if(!confirm('削除しますか？'))return;SIMPLE=SIMPLE.filter(it=>it.id!==id);saveItems();renderSimple();}
function addSales(){const inp=document.getElementById('new-sales-name');const name=inp.value.trim();if(!name){showToast('品目名を入力してください');return;}const id=uid();SALES.push({id,name});NYUKA[id]=[];saveItems();inp.value='';renderSales();restoreLastValues();showToast('追加しました');}
function delSales(id){if(!confirm('削除しますか？'))return;SALES=SALES.filter(it=>it.id!==id);delete NYUKA[id];saveItems();renderSales();}

// ===== 差異（前日在庫との比較） =====
function updateDiff(id){
  const stock=$v('stock_'+id);
  // 在庫入力欄の赤文字チェック
  const stockEl=document.getElementById('stock_'+id);
  if(stockEl){
    const it=SALES.find(x=>x.id===id);
    if(it&&isLowStock(it.name,stock)){stockEl.style.color='#e02020';stockEl.style.fontWeight='700';}
    else if(stockEl){stockEl.style.color='';stockEl.style.fontWeight='';}
  }
  const out=$v('sell_'+id)+$v('free_'+id);
  // [修正] prevStock()は「前日在庫＋前日入荷」を既に返す。今日の入荷はaddNyuka()で在庫欄に加算済みなので
  // nyukaTotalをexpectedに足すと二重加算になり誤警告の原因になるため削除。
  const prev=prevStock(id);
  const el=document.getElementById('diff_'+id);
  if(!el)return;
  // 前日在庫がある場合：（前日在庫＋前日入荷）vs 今日の在庫＋販売＋無料
  if(prev!==null){
    const expected=prev; // prevStock()に前日入荷が含まれている
    const actual=stock+out; // 今日の在庫＋出た数
    const diff=actual-expected;
    const isMismatch = diff!==0;
    if(diff===0){el.textContent='';el.className='dbadge ok';}
    else{el.textContent='前日'+(diff>0?'+':'')+diff;el.className='dbadge warn';}

  } else {
    el.textContent='';el.className='dbadge';
  }
  updateWarnBox();
}

function delUber(idx){

  renderUber();
  saveUberNow();
}
// Uber売上を即座にFirebaseへ保存
function saveUberNow(){
  const h=loadHistory();
  const idx=h.findIndex(r=>r.date===dateStr);
  if(idx>=0){
    h[idx].uber=[...UBER];
  } else {
    // 今日の記録がまだない場合は新規作成
    h.unshift({date:dateStr,time:'',staff:'',simple:{},sales:{},nyuka:{},uber:[...UBER],note:'',simpleItems:SIMPLE.map(it=>({id:it.id,name:it.name})),salesItems:SALES.map(it=>({id:it.id,name:it.name})),editLog:[]});
  }
  localStorage.setItem('zaiko_history',JSON.stringify(h));
  if(window.firebaseSave) window.firebaseSave(h);
}
function renderUber(){
  const total=UBER.reduce((s,u)=>s+u.amount,0);

    <div class="nyuka-item">

// ===== 入荷 個別編集・削除（今日分） =====
function saveNyukaEdit(id, nyIdx, inputId){
  const inputEl = document.getElementById(inputId);
  if(!inputEl) return;
  const newQty = parseInt(inputEl.value)||0;
  if(newQty < 1){ showToast('1以上の個数を入力してください'); return; }
  const oldQty = NYUKA[id][nyIdx].qty;
  const diff = newQty - oldQty;
  NYUKA[id][nyIdx].qty = newQty;
  $set('stock_'+id, $v('stock_'+id) + diff);
  updateDiff(id); renderNyuka(id);
  saveDraft();
  showToast('✅ 入荷数を ' + newQty + '個 に修正しました');
  showNyukaSummary(id); // 再描画
}

function deleteNyukaEntry(id, nyIdx){
  if(!confirm('この入荷記録を削除しますか？')) return;
  const qty = NYUKA[id][nyIdx].qty;
  NYUKA[id].splice(nyIdx, 1);
  $set('stock_'+id, $v('stock_'+id) - qty);
  updateDiff(id); renderNyuka(id);
  saveDraft();
  showToast('🗑 入荷記録を削除しました');
  showNyukaSummary(id);
}

// ===== 入荷 個別編集・削除（過去の保存済み分） =====
function saveNyukaHistEdit(id, histDate, entryIdx, inputId){
  const inputEl = document.getElementById(inputId);
  if(!inputEl) return;
  const newQty = parseInt(inputEl.value)||0;
  if(newQty < 1){ showToast('1以上の個数を入力してください'); return; }
  const h = loadHistory();
  const r = h.find(rec => rec.date === histDate);
  if(!r || !r.nyuka || !r.nyuka[id] || !r.nyuka[id][entryIdx]){
    showToast('⚠️ 該当の記録が見つかりませんでした'); return;
  }
  const oldQty = r.nyuka[id][entryIdx].qty;
  r.nyuka[id][entryIdx].qty = newQty;
  if(r.sales && r.sales[id] !== undefined){
    r.sales[id] = Math.max(0, r.sales[id] + (newQty - oldQty));
  }
  saveHistory(h);
  showToast('✅ 入荷数を ' + newQty + '個 に修正しました');
  showNyukaSummary(id);
}

function deleteNyukaHistEntry(id, histDate, entryIdx){
  if(!confirm('この入荷記録を削除しますか？')) return;
  const h = loadHistory();
  const r = h.find(rec => rec.date === histDate);
  if(!r || !r.nyuka || !r.nyuka[id] || !r.nyuka[id][entryIdx]){
    showToast('⚠️ 該当の記録が見つかりませんでした'); return;
  }
  const oldQty = r.nyuka[id][entryIdx].qty;
  r.nyuka[id].splice(entryIdx, 1);
  if(r.sales && r.sales[id] !== undefined){
    r.sales[id] = Math.max(0, r.sales[id] - oldQty);
  }
  saveHistory(h);
  showToast('🗑 入荷記録を削除しました');
  showNyukaSummary(id);
}

// ===== 入荷サマリーモーダル =====
function showNyukaSummary(id){
  const it = SALES.find(x=>x.id===id);
  if(!it) return;

  document.getElementById('nyuka-summary-title').textContent = it.name + ' の入荷記録';

  const thisMonth = dateStr.slice(0,7);
  const [y, m] = thisMonth.split('/');
  const monthLabel = y + '年' + parseInt(m) + '月';

  // ── 今日分（NYUKA[]から直接）──
  const todayEntries = (NYUKA[id]||[]).map((n, idx) => ({
    source: 'today', nyIdx: idx, date: n.date, qty: n.qty, staff: n.staff||''
  }));

  // ── 過去分（履歴から）── 今日の日付は除外
  const allH = loadHistory();
  const monthH = allH.filter(r => r.date.startsWith(thisMonth) && r.date !== dateStr);

  // dayKey → [{source:'hist', histDate, entryIdx, qty, staff}, ...]
  const histDayMap = {};
  monthH.forEach(r => {
    const nyList = (r.nyuka && r.nyuka[id]) ? r.nyuka[id] : [];

      const key = n.date.replace(/-/g,'/');
      if(!histDayMap[key]) histDayMap[key] = [];
      histDayMap[key].push({source:'hist', histDate: r.date, entryIdx: ni, qty: n.qty, staff: n.staff||''});

      });
      html += `<div style="background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:10px 14px;">
        <div style="display:flex;align-items:center;margin-bottom:6px;">

          <span style="font-size:13px;font-weight:700;color:var(--text);">計 ${dayTotal}個</span>
        </div>${entriesHtml}</div>`;
    });
    html += `</div>`;
  }

  // 今日の入荷入力フォーム（下部）
  html += `<div style="margin-top:16px;padding-top:14px;border-top:1px solid var(--border);">
    <div style="font-size:11px;font-weight:700;color:var(--text3);letter-spacing:.08em;margin-bottom:8px;">今日の入荷を追加</div>
    <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap;">
      <input type="date" id="nsummary-date-${id}" value="${todayISO}" style="flex:1;min-width:110px;font-size:12px;padding:7px 8px;border:1px solid var(--blue-bd);border-radius:8px;background:var(--surface);color:var(--text);font-family:inherit;">
      <input type="number" id="nsummary-qty-${id}" min="1" placeholder="個数" inputmode="numeric"

        onkeydown="if(event.key==='Enter')addNyukaFromSummary('${id}')">
      <button onclick="addNyukaFromSummary('${id}')" style="padding:7px 14px;background:var(--blue);color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;">＋ 追加</button>
    </div>
  </div>`;

  const container = document.getElementById('nyuka-summary-content');
  container.innerHTML = html;

  // イベントデリゲーション（data属性でonclick問題を回避）
  container.querySelectorAll('.ny-save-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const d = btn.dataset;
      if(d.type === 'today'){
        saveNyukaEdit(d.id, parseInt(d.nidx), d.input);
      } else {
        saveNyukaHistEdit(d.id, d.hdate, parseInt(d.eidx), d.input);

  container.querySelectorAll('.ny-del-btn').forEach(btn => {

      if(d.type === 'today'){
        deleteNyukaEntry(d.id, parseInt(d.nidx));
      } else {
        deleteNyukaHistEntry(d.id, d.hdate, parseInt(d.eidx));

function addNyukaFromSummary(id){
  const dateEl = document.getElementById('nsummary-date-'+id);
  const qtyEl  = document.getElementById('nsummary-qty-'+id);
  if(!dateEl||!qtyEl) return;
  const date = dateEl.value;
  const qty  = parseInt(qtyEl.value)||0;
  if(!date||qty<1){ showToast('日付と個数を入力してください'); return; }
  const staff = document.getElementById('staff').value.trim();
  NYUKA[id].push({date, qty, staff:staff||''});
  NYUKA[id].sort((a,b)=>a.date>b.date?-1:1);
  qtyEl.value = '';
  $set('stock_'+id, $v('stock_'+id)+qty);
  updateDiff(id); renderNyuka(id);
  saveDraft();
  showToast('入荷 '+qty+'個 → 在庫に追加しました ✅');
  showNyukaSummary(id);
}

function renderNyukaHistory(){
  const ym = document.getElementById('nyuka-history-month').value;
  if(!ym) return;
  const fm = ym.replace('-', '/'); // "2026/05"
  const [y, m] = ym.split('-').map(Number);
  const monthLabel = y + '年' + m + '月';
  const allH = loadHistory();
  const monthH = allH.filter(r => r.date.startsWith(fm));
  const el = document.getElementById('nyuka-history-content');

  if(!monthH.length){
    el.innerHTML = `<div style="text-align:center;padding:24px;color:var(--text3);font-size:13px;">この月の記録がありません</div>`;
    return;
  }

  // 品目ごとに入荷データを集計
  // { itemId: { name, days: { "2026/05/03": qty, ... }, total: 0 } }
  const itemMap = {};

  // SALES品目の順序を基準に
  SALES.forEach(it => {
    itemMap[it.id] = { name: it.name, days: {}, totalQty: 0, totalDays: 0 };
  });

  monthH.forEach(r => {
    const nyuka = r.nyuka || {};
    Object.keys(nyuka).forEach(id => {
      if(!itemMap[id]){
        // 当時の品目名を履歴から取得
        const sItem = (r.salesItems||[]).find(x=>x.id===id);
        itemMap[id] = { name: sItem ? sItem.name : id, days: {}, totalQty: 0, totalDays: 0 };
      }
      nyuka[id].forEach(n => {
        const key = n.date.replace(/-/g,'/');
        if(!itemMap[id].days[key]) itemMap[id].days[key] = 0;
        itemMap[id].days[key] += n.qty;
      });
    });
  });

  // 今日の未保存分も含める
  SALES.forEach(it => {
    if(!NYUKA[it.id] || !NYUKA[it.id].length) return;
    NYUKA[it.id].forEach(n => {
      const key = n.date.replace(/-/g,'/');
      if(!key.startsWith(fm)) return;
      if(!itemMap[it.id]) itemMap[it.id] = { name: it.name, days: {}, totalQty: 0, totalDays: 0 };
      // 今日の記録が履歴にまだない場合のみ
      if(!monthH.find(r=>r.date===dateStr)){
        if(!itemMap[it.id].days[key]) itemMap[it.id].days[key] = 0;
        itemMap[it.id].days[key] += n.qty;
      }
    });
  });

  // totalQty / totalDays を計算
  Object.keys(itemMap).forEach(id => {
    const days = itemMap[id].days;
    itemMap[id].totalDays = Object.keys(days).length;
    itemMap[id].totalQty  = Object.values(days).reduce((s,v)=>s+v, 0);
  });

  // 入荷があった品目のみ表示
  const entries = Object.entries(itemMap).filter(([,v]) => v.totalDays > 0);

  if(!entries.length){
    el.innerHTML = `<div style="text-align:center;padding:24px;color:var(--text3);font-size:13px;">${monthLabel}の入荷記録はありません</div>`;
    return;
  }

  let html = `<div style="font-size:12px;color:var(--text3);font-weight:700;letter-spacing:.06em;margin-bottom:10px;">${monthLabel}の入荷まとめ</div>`;

  entries.forEach(([id, item]) => {
    const sortedDays = Object.keys(item.days).sort();
    html += `
    <div style="background:var(--bg);border:1px solid var(--border);border-radius:12px;margin-bottom:10px;overflow:hidden;">
      <!-- 品目ヘッダー -->
      <div style="background:var(--green-light);padding:10px 14px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px;">
        <span style="font-size:14px;font-weight:700;color:var(--green-text);">📦 ${esc(item.name)}</span>
        <div style="display:flex;gap:10px;">
          <span style="font-size:12px;font-weight:700;background:#fff;color:var(--green-text);padding:3px 10px;border-radius:20px;">
            ${item.totalDays}日
          </span>
          <span style="font-size:12px;font-weight:700;background:#fff;color:var(--blue);padding:3px 10px;border-radius:20px;">
            計 ${item.totalQty}個
          </span>
        </div>
      </div>
      <!-- 日別明細 -->
      <div style="padding:8px 14px 10px;">`;

    sortedDays.forEach(dateKey => {
      const qty = item.days[dateKey];
      const [,, dd] = dateKey.split('/');
      const weekDay = '日月火水木金土'[new Date(y, m-1, parseInt(dd)).getDay()];
      const isWeekend = new Date(y, m-1, parseInt(dd)).getDay() % 6 === 0;
      // スタッフ名を収集（その日の入荷スタッフ一覧）
      const staffSet = new Set();
      monthH.forEach(r => {
        if(!r.nyuka || !r.nyuka[id]) return;
        r.nyuka[id].forEach(n => {
          const k = n.date.replace(/-/g,'/');
          if(k === dateKey && n.staff) staffSet.add(n.staff);
        });
      });
      const staffLabel = staffSet.size ? '👤 '+[...staffSet].join('・') : '';
      html += `
        <div style="display:flex;align-items:center;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--border);gap:6px;flex-wrap:wrap;">
          <span style="font-size:13px;font-weight:600;color:${isWeekend?'#c04000':'var(--text)'};">${parseInt(m)}/${parseInt(dd)}（${weekDay}）</span>
          ${staffLabel?`<span style="font-size:11px;color:var(--blue);flex:1;">${staffLabel}</span>`:''}
          <span style="font-size:14px;font-weight:700;color:var(--blue);">${qty}個</span>
        </div>`;
    });

    html += `</div></div>`;
  });

  el.innerHTML = html;
}

// ===== 入荷削除（グローバル関数・onclick属性から直接呼ぶ）=====
function nyukaDelToday(id, idx){
  if(!NYUKA[id] || !NYUKA[id][idx]) return;
  const qty = NYUKA[id][idx].qty;
  NYUKA[id].splice(idx, 1);
  $set('stock_'+id, $v('stock_'+id) - qty);
  updateDiff(id);
  saveDraft();
  nyukaRender(id);
  showToast('🗑 入荷を削除しました');
}
function nyukaDelHist(id, histDate, entryIdx){
  if(!confirm('この入荷記録を削除しますか？')) return;
  const h = loadHistory();
  const r = h.find(rec => rec.date === histDate);
  if(!r || !r.nyuka || !r.nyuka[id]){ showToast('⚠️ 記録が見つかりません'); return; }
  const qty = r.nyuka[id][entryIdx] ? r.nyuka[id][entryIdx].qty : 0;
  r.nyuka[id].splice(entryIdx, 1);
  if(r.sales && r.sales[id] !== undefined) r.sales[id] = Math.max(0, r.sales[id] - qty);
  saveHistory(h);
  nyukaRender(id);
  showToast('🗑 入荷を削除しました');
}

function nyukaRender(id){
  if(!NYUKA[id]) NYUKA[id] = [];
  const todayTotal = NYUKA[id].reduce((s,n)=>s+n.qty, 0);

  // 過去分を履歴から取得
  const allH = loadHistory();
  const pastEntries = [];
  allH.forEach(r => {
    if(r.date === dateStr) return;
    ((r.nyuka && r.nyuka[id]) ? r.nyuka[id] : []).forEach((n, ni) => {
      pastEntries.push({date:n.date, qty:n.qty, staff:n.staff||'', histDate:r.date, entryIdx:ni});
    });
  });
  pastEntries.sort((a,b) => a.date > b.date ? -1 : 1);

  const pastTotal = pastEntries.reduce((s,e)=>s+e.qty, 0);
  const tot = document.getElementById('ntotal_'+id);
  if(tot) tot.textContent = (todayTotal+pastTotal) ? '合計'+(todayTotal+pastTotal)+'個' : '';

  const list = document.getElementById('nlist_'+id);
  if(!list) return;

  // innerHTML で一気に構築（onclick属性はグローバル関数を直接呼ぶ）
  let html = '';

  NYUKA[id].forEach((n, i) => {
    const staffHtml = n.staff ? '<span style="font-size:11px;color:var(--blue);background:var(--blue-light);padding:1px 7px;border-radius:10px;">👤'+esc(n.staff)+'</span>' : '';
    html += '<div class="nyuka-item">'
      + '<span class="ndate">'+n.date.replace(/-/g,'/')+'</span>'
      + '<span class="nqty">'+n.qty+'個</span>'
      + staffHtml
      + '<button class="nyuka-del" onclick="nyukaDelToday(&quot;' + id + '&quot;,' + i + ')">✕</button>'
      + '</div>';
  });

  pastEntries.forEach((e, pi) => {
    const staffHtml = e.staff ? '<span style="font-size:11px;color:var(--blue);background:var(--blue-light);padding:1px 7px;border-radius:10px;">👤'+esc(e.staff)+'</span>' : '';
    html += '<div class="nyuka-item" style="opacity:.8;">'
      + '<span class="ndate">'+e.date.replace(/-/g,'/')+'</span>'
      + '<span class="nqty">'+e.qty+'個</span>'
      + staffHtml
      + '<button class="nyuka-del" onclick="nyukaDelHist(&quot;' + id + '&quot;,&quot;' + e.histDate + '&quot;,' + e.entryIdx + ')">✕</button>'
      + '</div>';
  });

  list.innerHTML = html;
}

// ===== 保存 =====

function doSave(autoSave=false){
  if(editMode){showToast('品目編集を完了してください');return;}
  const staff=document.getElementById('staff').value.trim();
  if(!staff&&!autoSave){showToast('担当者名を入力してください');return;}
  if(!autoSave&&!completed){if(!confirm('入力完了ボタンが押されていません。このまま保存しますか？'))return;}
  const t=new Date();
  const timeStr=t.getHours().toString().padStart(2,'0')+':'+t.getMinutes().toString().padStart(2,'0');
  // [修正] doSave内の警告判定も同様に修正。prevStock()に前日入荷が含まれるためnyukaTotalは不要。
  const warns=SALES.filter(it=>{
    const prev=prevStock(it.id);
    if(prev===null)return false;
    return($v('stock_'+it.id)+$v('sell_'+it.id)+$v('free_'+it.id))!==prev;
  });
  // 編集中の場合はその日付で保存、新規なら今日の日付
  const targetDate = editingDate || dateStr;
  const record={
    date:targetDate, time:timeStr, staff,
    simple:{},sales:{},nyuka:{},
    simpleItems:SIMPLE.map(it=>({id:it.id,name:it.name})),
    salesItems:SALES.map(it=>({id:it.id,name:it.name})),
    note:document.getElementById('note').value.trim(),
    uber:[...UBER],
    hasWarn:warns.length>0,
    forceCompleted:_isForceComplete||false,
    warnItems:_isForceComplete?warns.map(function(it){return it.id;}):[],

    editLog:[] // 編集履歴
  };
  SIMPLE.forEach(it=>{record.simple[it.id]=$v('simple_'+it.id);});
  SALES.forEach(it=>{
    record.sales[it.id]=$v('stock_'+it.id);
    record.sales[it.id+'_sell']=$v('sell_'+it.id);
    record.sales[it.id+'_free']=$v('free_'+it.id);
    record.nyuka[it.id]=[...NYUKA[it.id]];
  });
  const h=loadHistory();
  const idx=h.findIndex(r=>r.date===targetDate);
  if(idx>=0){
    // 既存記録を上書き・編集ログを引き継ぎ＆追記
    const prev=h[idx];
    const isBackEdit=editingDate&&editingDate!==dateStr;
    // 差分を計算して保存
    const diffItems=[];
    const allItems2=[
      ...(prev.simpleItems||SIMPLE).map(it=>({id:it.id,name:it.name,type:'simple'})),
      ...(prev.salesItems||SALES).map(it=>({id:it.id,name:it.name,type:'sales'}))
    ];
    allItems2.forEach(it=>{
      const before = it.type==='simple'
        ? (prev.simple[it.id]||0)
        : (prev.sales[it.id]||0);
      const after = it.type==='simple'
        ? (record.simple[it.id]||0)
        : (record.sales[it.id]||0);
      if(before!==after) diffItems.push({name:it.name,before,after});
    });
    record.editLog=[...(prev.editLog||[]),{
      editTime:timeStr,editDate:dateStr,staff,
      note:isBackEdit?'さかのぼり編集（'+editingDate+'の記録を'+dateStr+'に修正）':'編集保存',
      diff:diffItems
    }];
    h[idx]=record;
  } else {
    h.unshift(record);
  }
  saveHistory(h);
  saveStaffName();
  editingDate=null; // 編集日付をリセット
  renderHistory();
  showToast('✅ 記録を保存しました！');
}


// ===== 履歴 =====
function clearFilter(){
  document.getElementById('filter-month').value='';
  document.getElementById('filter-date').value='';
  renderHistory();
}

function renderHistory(){
  const allH=loadHistory();
  const el=document.getElementById('hist-card');
  const filterMonth=document.getElementById('filter-month').value;
  const filterDate=document.getElementById('filter-date').value;
  let h=allH;
  if(filterDate){
    const fd=filterDate.replace(/-/g,'/');
    h=allH.filter(r=>r.date===fd);
  } else if(filterMonth){
    const fm=filterMonth.replace('-','/');
    h=allH.filter(r=>r.date.startsWith(fm));
  }
  document.getElementById('hist-count').textContent=allH.length?allH.length+'件中'+h.length+'件':'';
  renderMonthSummary(h,filterMonth);
  if(!h.length){el.innerHTML='<div class="hist-empty">該当する記録がありません</div>';return;}
  el.innerHTML=h.map((r)=>{
    const realIdx=allH.indexOf(r);
    // 現在のSIMPLE並び順に合わせて表示
    const siMap=Object.fromEntries((r.simpleItems||SIMPLE).map(x=>[x.id,x]));
    const si=SIMPLE.map(x=>siMap[x.id]||x).filter(x=>r.simple&&r.simple[x.id]!==undefined);
    const saMap=Object.fromEntries((r.salesItems||SALES).map(x=>[x.id,x]));
    const sa=SALES.map(x=>saMap[x.id]||x).filter(x=>r.sales&&r.sales[x.id]!==undefined);
    let stbl=`<div class="htbl-section"><div class="htbl-label">在庫数のみ</div><table class="htbl"><tbody>`;
    si.forEach(it=>{const qty=r.simple[it.id]||0;const warn=isLowStock(it.name,qty)?'stock-low':'';stbl+=`<tr><td>${esc(it.name)}</td><td colspan="4"><span class="stock-val ${warn}">${qty}</span>個</td></tr>`;});
    stbl+=`</tbody></table></div>`;
    let stbl2=`<div class="htbl-section"><div class="htbl-label">販売・無料</div><table class="htbl"><thead><tr><th>品目</th><th>在庫</th><th>販売</th><th>無料</th><th>差異</th></tr></thead><tbody>`;
    sa.forEach(it=>{
      const s=r.sales[it.id]||0,sell=r.sales[it.id+'_sell']||0,free=r.sales[it.id+'_free']||0,diff=s-sell-free;const sWarn=isLowStock(it.name,s)?'stock-low':'';
      const ny=(r.nyuka&&r.nyuka[it.id]&&r.nyuka[it.id].length)?` <span style="color:var(--blue);font-size:10px;">入荷${r.nyuka[it.id].reduce((a,n)=>a+n.qty,0)}</span>`:'';
      const dc=diff===0?'diff-ok':'diff-warn';
      const isWarnRow=r.forceCompleted&&r.warnItems&&r.warnItems.includes(it.id);
      stbl2+=`<tr class="${isWarnRow?'warn-row':''}"><td>${esc(it.name)}${ny}</td><td><span class="stock-val ${sWarn}">${s}</span></td><td>${sell}</td><td>${free}</td><td class="${dc}">${diff>0?'+':''}${diff}</td></tr>`;
    });
    stbl2+=`</tbody></table></div>`;
    const uberTotal=(r.uber&&r.uber.length)?r.uber.reduce((s,u)=>s+u.amount,0):0;
    const uberHtml=r.uber&&r.uber.length?`<div style="margin-bottom:4px;padding:6px 10px;background:#f0f7ff;border-radius:8px;font-size:12px;">🛵 Uber Eats：${r.uber.map(u=>'¥'+u.amount.toLocaleString()+'('+u.time+')').join(' / ')} <strong>合計 ¥${uberTotal.toLocaleString()}</strong></div>`:'';
    const noteHtml=r.note?`<div class="hist-note">📝 ${esc(r.note)}</div>`:'';

    // 差分ポップアップHTML
    let diffPopupHtml='';
    if(r.editLog&&r.editLog.length){
      const allDiffs=r.editLog.filter(e=>e.diff&&e.diff.length);
      if(allDiffs.length){
        let rows='';
        allDiffs.forEach(e=>{
          rows+=`<div style="font-size:10px;color:var(--text3);margin-top:4px;">✏️ ${esc(e.editDate||'')} ${esc(e.editTime||'')} 👤${esc(e.staff)}</div>`;
          e.diff.forEach(d=>{
            rows+=`<div class="diff-popup-row">・${esc(d.name)}：<span style="color:var(--text)">${d.before}個</span><span class="diff-arrow">➡</span><span style="color:var(--blue);font-weight:700;">${d.after}個</span></div>`;
          });
        });
        diffPopupHtml=`<div class="diff-popup" id="diffpop_${realIdx}">${rows}</div>`;
      }
    }
    const hasEdit=r.editLog&&r.editLog.length&&r.editLog.some(e=>e.diff&&e.diff.length);
    return`<div class="hist-row${r.forceCompleted?' force-completed':''}">
      <div class="hist-meta">
        <button class="hist-date-btn" onclick="toggleDiffPop(${realIdx})" title="タップで編集差分を表示">
          📅 ${fmtDate(r.date)}${hasEdit?'<span class="diff-toggle-hint">✏️</span>':''}
        </button>
        <span class="hist-time">${r.time||''}</span>
        ${r.staff?`<span class="hist-staff">👤 ${esc(r.staff)}</span>`:''}
        ${r.hasWarn?'<span class="hist-warn-badge">⚠️ 差異あり</span>':''}
        <button class="hist-edit-btn" onclick="editRecord(${realIdx})">✏️ 編集</button>
      </div>
      ${diffPopupHtml}
      ${stbl}${uberHtml}${stbl2}${noteHtml}
    </div>`;
  }).join('');
}

function renderMonthSummary(h,filterMonth){
  const el=document.getElementById('month-summary');
  if(!el)return;
  // 月フィルターなしのときは今月のデータを使う
  const allH=loadHistory();
  const thisMonth=dateStr.slice(0,7).replace('/','-'); // 例: 2026-05
  const targetMonth=filterMonth||thisMonth;
  const fm=targetMonth.replace('-','/');
  const targetH=filterMonth?h:allH.filter(r=>r.date.startsWith(fm));
  if(!targetH.length){el.style.display='none';return;}
  const salesTotals={};
  targetH.forEach(r=>{
    const saMap=Object.fromEntries((r.salesItems||SALES).map(x=>[x.id,x]));
    const sa=SALES.map(x=>saMap[x.id]||x).filter(x=>r.sales&&r.sales[x.id]!==undefined);
    sa.forEach(it=>{
      if(!salesTotals[it.name])salesTotals[it.name]={sell:0,free:0};
      salesTotals[it.name].sell+=r.sales[it.id+'_sell']||0;
      salesTotals[it.name].free+=r.sales[it.id+'_free']||0;
    });
  });
  // 無料が0の品目は除外
  const entries=Object.entries(salesTotals).filter(([,v])=>v.free>0||v.sell>0);
  if(!entries.length){el.style.display='none';return;}
  const label=filterMonth?`📆 ${fm} 月まとめ（${targetH.length}日分）`:`📆 今月（${fm}）の集計（${targetH.length}日分）`;
  let html=`<div style="background:var(--done-bg);border:1px solid var(--done-bd);border-radius:var(--r);padding:12px;margin-bottom:8px;">
    <div style="font-size:13px;font-weight:700;color:#7a6000;margin-bottom:8px;">${label}</div>
    <table class="htbl"><thead><tr><th>品目</th><th>販売計</th><th style="color:#c04000;font-weight:700;">無料計</th></tr></thead><tbody>`;
  entries.forEach(([name,v])=>{
    const freeStyle=v.free>0?'style="color:#c04000;font-weight:700;"':'';
    html+=`<tr><td>${esc(name)}</td><td>${v.sell}</td><td ${freeStyle}>${v.free}</td></tr>`;
  });
  // Uber Eats月間合計
  let uberMonthTotal=0;let uberMonthCount=0;
  targetH.forEach(r=>{if(r.uber&&r.uber.length){uberMonthTotal+=r.uber.reduce((s,u)=>s+u.amount,0);uberMonthCount+=r.uber.length;}});
  const uberSummary=uberMonthCount?`<div style="margin-top:8px;padding:6px 10px;background:#f0f7ff;border-radius:8px;font-size:13px;font-weight:700;color:var(--blue);">🛵 Uber Eats 月間売上：¥${uberMonthTotal.toLocaleString()}（${uberMonthCount}件）</div>`:'';
  html+=`</tbody></table>${uberSummary}</div>`;
  el.innerHTML=html;
  el.style.display='block';
}

function renderUberModal(){
  const ym=document.getElementById('uber-modal-month').value;
  if(!ym) return;
  const fm=ym.replace('-','/');
  const allH=loadHistory();
  const h=allH.filter(r=>r.date.startsWith(fm));
  const el=document.getElementById('uber-modal-content');
  if(!h.length){
    el.innerHTML=`<div style="text-align:center;padding:20px;color:var(--text3);">この月の記録がありません</div>`;
    return;
  }
  // 月の日数を計算
  const [y,m]=ym.split('-').map(Number);
  const daysInMonth=new Date(y,m,0).getDate();
  // 日付→記録のマップ
  const recordMap={};
  h.forEach(r=>{ recordMap[r.date]=r; });
  let totalAmt=0,totalCnt=0,salesDays=0;
  let rows='';
  for(let d=1;d<=daysInMonth;d++){
    const dd=String(d).padStart(2,'0');
    const dateKey=`${fm}/${dd}`;
    const r=recordMap[dateKey];
    const weekDay=['日','月','火','水','木','金','土'][new Date(y,m-1,d).getDay()];
    const isWeekend=(new Date(y,m-1,d).getDay()===0||new Date(y,m-1,d).getDay()===6);
    const today=dateStr;
    const isFuture=dateKey>today;
    if(r&&r.uber&&r.uber.length){
      const dayTotal=r.uber.reduce((s,u)=>s+u.amount,0);
      totalAmt+=dayTotal; totalCnt+=r.uber.length; salesDays++;
      const items=r.uber.map(u=>'¥'+u.amount.toLocaleString()+'('+u.time+')').join('<br>');
      rows+=`<tr style="background:#f0f6ff;">
        <td style="padding:6px 4px;white-space:nowrap;font-weight:700;color:${isWeekend?'#c04000':'var(--text)'};">${fm}/${dd}(${weekDay})</td>
        <td style="padding:6px 4px;font-size:11px;color:var(--text2);line-height:1.6;">${items}</td>
        <td style="padding:6px 4px;font-weight:700;color:var(--blue);text-align:right;white-space:nowrap;">¥${dayTotal.toLocaleString()}</td>
      </tr>`;
    } else if(!isFuture){
      rows+=`<tr style="opacity:.45;">
        <td style="padding:4px 4px;white-space:nowrap;color:${isWeekend?'#c04000':'var(--text3)'};">${fm}/${dd}(${weekDay})</td>
        <td style="padding:4px 4px;font-size:11px;color:var(--text3);">${r?'記録あり（Uberなし）':'—'}</td>
        <td style="padding:4px 4px;text-align:right;color:var(--text3);">—</td>
      </tr>`;
    } else {
      rows+=`<tr style="opacity:.25;">
        <td style="padding:4px 4px;white-space:nowrap;color:${isWeekend?'#c04000':'var(--text3)'};">${fm}/${dd}(${weekDay})</td>
        <td colspan="2" style="padding:4px 4px;font-size:11px;color:var(--text3);">未来</td>
      </tr>`;
    }
  }
  el.innerHTML=`
    <div style="background:#e8f0ff;border-radius:10px;padding:14px 16px;margin-bottom:12px;text-align:center;">
      <div style="font-size:13px;color:#1a3f8a;margin-bottom:6px;">${fm} 月間売上</div>
      <div style="font-size:32px;font-weight:700;color:#1a3f8a;">¥${totalAmt.toLocaleString()}</div>
      <div style="display:flex;justify-content:center;gap:16px;margin-top:6px;font-size:12px;color:#4a6abf;">
        <span>📦 ${totalCnt}件</span>
        <span>📅 ${salesDays}日</span>
        <span>📊 平均 ¥${salesDays?Math.round(totalAmt/salesDays).toLocaleString():0}/日</span>
      </div>
    </div>
    <table style="width:100%;border-collapse:collapse;font-size:13px;">
      <thead><tr style="border-bottom:2px solid var(--border2);">
        <th style="padding:6px 4px;text-align:left;">日付</th>
        <th style="padding:6px 4px;text-align:left;">内訳</th>
        <th style="padding:6px 4px;text-align:right;">合計</th>
      </tr></thead>
      <tbody>${rows}</tbody>
      <tfoot><tr style="border-top:2px solid var(--border2);background:var(--done-bg);">
        <td colspan="2" style="padding:8px 4px;font-weight:700;">月間合計</td>
        <td style="padding:8px 4px;font-weight:700;color:var(--blue);text-align:right;font-size:15px;">¥${totalAmt.toLocaleString()}</td>
      </tr></tfoot>
    </table>`;
}

// ===== LINE シェア =====
function shareToLine(){
  const url='https://zaiko-app-two.vercel.app';
  // execCommandはHTTP/HTTPS/file問わず動作する確実な方法
  const ta=document.createElement('textarea');
  ta.value=url;
  ta.setAttribute('readonly','');
  ta.style.cssText='position:fixed;top:0;left:0;opacity:0;pointer-events:none;';
  document.body.appendChild(ta);
  ta.focus();
  ta.select();
  ta.setSelectionRange(0,99999);
  let ok=false;
  try{ ok=document.execCommand('copy'); }catch(e){}
  document.body.removeChild(ta);
  if(ok){
    // ボタンを一時的に変化させてコピー成功を視覚的に伝える
    const btn=document.getElementById('line-share-btn');
    if(btn){
      const orig=btn.textContent;
      btn.textContent='✅ コピーしました！';
      btn.style.background='#2c5f2e';
      setTimeout(()=>{btn.textContent=orig;btn.style.background='';},2500);
    }
    showToast('🔗 URLをコピーしました！LINEに貼り付けてください');
  } else if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(url).then(()=>{
      const btn=document.getElementById('line-share-btn');
      if(btn){
        const orig=btn.textContent;
        btn.textContent='✅ コピーしました！';
        btn.style.background='#2c5f2e';
        setTimeout(()=>{btn.textContent=orig;btn.style.background='';},2500);
      }
      showToast('🔗 URLをコピーしました！LINEに貼り付けてください');
    }).catch(()=>{ prompt('このURLをコピーしてください',url); });
  } else {
    prompt('このURLをコピーしてください',url);
  }
}

// ===== 前回値の復元 =====
function restoreLastValues(){
  const h=loadHistory();
  if(!h.length) return;
  const last=h[0];
  SIMPLE.forEach(it=>{
    const v=last.simple&&last.simple[it.id]!==undefined?last.simple[it.id]:0;
    $set('simple_'+it.id, v);
  });
  SALES.forEach(it=>{
    const stock=last.sales&&last.sales[it.id]!==undefined?last.sales[it.id]:0;
    const sell =last.sales&&last.sales[it.id+'_sell']!==undefined?last.sales[it.id+'_sell']:0;
    const free =last.sales&&last.sales[it.id+'_free']!==undefined?last.sales[it.id+'_free']:0;
    $set('stock_'+it.id, stock);
    $set('sell_'+it.id,  sell);
    $set('free_'+it.id,  free);
    if(last.nyuka&&last.nyuka[it.id]) NYUKA[it.id]=[...last.nyuka[it.id]];
    renderNyuka(it.id);
    updateDiff(it.id);
  });
  // 色チェック
  SIMPLE.forEach(it=>checkSimpleLow(it.id));
  SALES.forEach(it=>updateDiff(it.id));
  // Uber Eats：今日の記録があれば復元、なければ空に
  UBER = (last.date===dateStr && last.uber) ? [...last.uber] : [];
  renderUber();

  // 備考：今日の記録があれば復元、なければ（翌日以降）空にする
  const noteEl=document.getElementById('note');
  if(noteEl){
    if(last.date===dateStr){
      noteEl.value=last.note||'';
    } else {
      noteEl.value='';
    }
  }
}


// ===== 下書き自動保存（更新・リロード対策）=====
const DRAFT_KEY = 'zaiko_draft_' + dateStr.replace(/\//g, '-');

function saveDraft(){
  try{
    const draft = {
      date: dateStr,
      note: document.getElementById('note') ? document.getElementById('note').value : '',
      simple: {},
      sales: {},
      nyuka: {},
      uber: [...UBER],
    };
    SIMPLE.forEach(it=>{ draft.simple[it.id] = $v('simple_'+it.id); });
    SALES.forEach(it=>{
      draft.sales[it.id]         = $v('stock_'+it.id);
      draft.sales[it.id+'_sell'] = $v('sell_'+it.id);
      draft.sales[it.id+'_free'] = $v('free_'+it.id);
      draft.nyuka[it.id]         = [...(NYUKA[it.id]||[])];
    });
    localStorage.setItem(DRAFT_KEY, JSON.stringify(draft));
  }catch(e){}
}

function loadDraft(){
  try{
    const s = localStorage.getItem(DRAFT_KEY);
    if(!s) return null;
    const d = JSON.parse(s);
    if(d.date !== dateStr) return null;
    return d;
  }catch(e){ return null; }
}

function clearDraft(){
  try{ localStorage.removeItem(DRAFT_KEY); }catch(e){}
  // 前日以前の下書きも掃除
  try{
    Object.keys(localStorage).forEach(k=>{
      if(k.startsWith('zaiko_draft_') && k !== DRAFT_KEY) localStorage.removeItem(k);
    });
  }catch(e){}
}

function restoreDraft(){
  const draft = loadDraft();
  if(!draft) return false;
  SIMPLE.forEach(it=>{
    if(draft.simple && draft.simple[it.id] !== undefined) $set('simple_'+it.id, draft.simple[it.id]);
  });
  SALES.forEach(it=>{
    if(draft.sales){
      if(draft.sales[it.id]           !== undefined) $set('stock_'+it.id, draft.sales[it.id]);
      if(draft.sales[it.id+'_sell']   !== undefined) $set('sell_'+it.id,  draft.sales[it.id+'_sell']);
      if(draft.sales[it.id+'_free']   !== undefined) $set('free_'+it.id,  draft.sales[it.id+'_free']);
    }
    if(draft.nyuka && draft.nyuka[it.id]) NYUKA[it.id] = [...draft.nyuka[it.id]];
    renderNyuka(it.id);
    updateDiff(it.id);
  });
  SIMPLE.forEach(it=>checkSimpleLow(it.id));
  if(draft.uber) { UBER = [...draft.uber]; renderUber(); }
  const noteEl = document.getElementById('note');
  if(noteEl && draft.note !== undefined) noteEl.value = draft.note;
  return true;
}
