<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1D9E75">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="在庫管理">
<title>在庫管理</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
(function(){
  const svg=`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192"><rect width="192" height="192" rx="40" fill="#1D9E75"/><!-- 箱本体 --><rect x="32" y="80" width="128" height="88" rx="6" fill="#C8893A"/><!-- 箱の上フラップ左 --><rect x="32" y="52" width="58" height="32" rx="4" fill="#E8A84A"/><!-- 箱の上フラップ右 --><rect x="102" y="52" width="58" height="32" rx="4" fill="#D49838"/><!-- フラップ中央の隙間線 --><line x1="96" y1="52" x2="96" y2="84" stroke="#1D9E75" stroke-width="4"/><!-- 箱のテープ横線 --><rect x="32" y="124" width="128" height="10" rx="3" fill="#E8C97A" opacity="0.7"/><!-- 箱中央縦線 --><line x1="96" y1="80" x2="96" y2="168" stroke="#A86B28" stroke-width="3" opacity="0.5"/></svg>`;
  const uri='data:image/svg+xml;base64,'+btoa(unescape(encodeURIComponent(svg)));
  window.addEventListener('DOMContentLoaded',()=>{
    const l=document.createElement('link');l.rel='apple-touch-icon';l.href=uri;document.head.appendChild(l);
    const m=document.createElement('link');m.rel='manifest';
    const blob=new Blob([JSON.stringify({name:'在庫管理',short_name:'在庫管理',start_url:'./',display:'standalone',background_color:'#1D9E75',theme_color:'#1D9E75',icons:[{src:uri,sizes:'192x192',type:'image/svg+xml'}]})],{type:'application/manifest+json'});
    m.href=URL.createObjectURL(blob);document.head.appendChild(m);
  });
})();

// リンクをコピー
function shareToLine(){
  const url = 'https://zaiko-app-two.vercel.app/inventory.html';
  navigator.clipboard.writeText(url).then(()=>{
    alert('URLをコピーしました！\nLINEに貼り付けて共有してください。');
  }).catch(()=>{
    prompt('このURLをコピーしてください', url);
  });
}
</script>
<style>
:root{--g:#1D9E75;--gd:#0F6E56;--gl:#E1F5EE;--r:#E24B4A;--rl:#FCEBEB;--a:#BA7517;--al:#FAEEDA;--p:#534AB7;--pl:#EEEDFE;--gr:#5F5E5A;--grl:#F1EFE8;--bg:#F7F6F3;--sf:#FFF;--bd:rgba(0,0,0,0.1);--bds:rgba(0,0,0,0.18);--tx:#1a1a18;--tm:#6b6a66;--tf:#9e9c97;--ra:12px;--rs:8px;--sh:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.06);--shm:0 4px 12px rgba(0,0,0,.1),0 2px 4px rgba(0,0,0,.06)}
@media(prefers-color-scheme:dark){:root{--bg:#1a1a18;--sf:#242422;--bd:rgba(255,255,255,.1);--bds:rgba(255,255,255,.18);--tx:#f0efeb;--tm:#9e9c97;--tf:#6b6a66;--gl:#042C53;--rl:#501313;--al:#412402;--pl:#26215C;--grl:#2C2C2A}}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,'Hiragino Sans','Yu Gothic',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh}
.app{display:flex;flex-direction:column;min-height:100vh;max-width:900px;margin:0 auto}
.hdr{background:var(--sf);border-bottom:1px solid var(--bd);padding:10px 12px;position:sticky;top:0;z-index:100}
.hdr-in{display:flex;align-items:center;justify-content:space-between;gap:6px;flex-wrap:nowrap}
.hdr-title{display:flex;align-items:center;gap:6px;flex-shrink:0}
.hdr-title h1{font-size:15px;font-weight:700;white-space:nowrap}
.hdr-icon{width:28px;height:28px;background:var(--g);border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.hdr-ctrl{display:flex;align-items:center;gap:4px;flex-shrink:0}
.role-pill{display:inline-flex;align-items:center;gap:3px;padding:4px 7px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;border:none;white-space:nowrap}
.role-pill.admin{background:var(--pl);color:var(--p)}.role-pill.editor{background:var(--gl);color:var(--gd)}.role-pill.viewer{background:var(--grl);color:var(--gr)}
.role-pill.inactive{opacity:0.35;filter:grayscale(0.4)}
.line-share-btn{display:inline-flex;align-items:center;gap:4px;padding:5px 10px;border-radius:20px;background:#06C755;border:none;color:#fff;font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap;font-family:inherit;}
.line-share-btn:active{background:#05a849;}
.cat-tag{display:inline-flex;align-items:center;padding:5px 12px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;border:1.5px solid var(--bd);background:var(--sf);color:var(--tx);white-space:nowrap;transition:all .15s}
.cat-tag.active{background:var(--gl);border-color:var(--g);color:var(--g)}
.cat-tag.all{background:var(--bg);border-color:var(--bd);color:var(--tm)}
.cat-tag.all.active{background:var(--pl);border-color:var(--p);color:var(--p)}
.hist-table{width:100%;border-collapse:collapse;font-size:13px}
.hist-table th{background:var(--bg);padding:8px 10px;text-align:left;font-size:11px;font-weight:700;color:var(--tm);border-bottom:2px solid var(--bd)}
.hist-table td{padding:8px 10px;border-bottom:1px solid var(--bd);vertical-align:middle}
.hist-up{color:#1D9E75;font-weight:700}.hist-down{color:#E24B4A;font-weight:700}.hist-same{color:var(--tf)}
.hist-badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:700}
.hist-badge.up{background:#E8F8F2;color:#1D9E75}.hist-badge.down{background:#FEE;color:#E24B4A}.hist-badge.same{background:var(--bg);color:var(--tf)}
.role-switcher{display:flex;align-items:center;gap:3px}
.hdr-h1{display:none}
.lightbox{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:900;display:flex;align-items:center;justify-content:center;padding:20px}
.lightbox img{max-width:100%;max-height:90vh;border-radius:16px;object-fit:contain;box-shadow:0 8px 40px rgba(0,0,0,.5)}
.lightbox-close{position:fixed;top:16px;right:16px;width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,.2);border:none;color:#fff;font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.store-bar{background:var(--sf);border-bottom:1px solid var(--bd);padding:0 12px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.store-bar::-webkit-scrollbar{display:none}
.store-tabs{display:flex;gap:4px;padding:8px 0;min-width:max-content}
.stab{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:20px;font-size:13px;font-weight:500;cursor:pointer;border:1.5px solid var(--bd);background:transparent;color:var(--tm);white-space:nowrap;transition:all .15s}
.stab.active{background:var(--g);border-color:var(--g);color:#fff}
.stab:not(.active):hover{background:var(--bg)}
.stab .dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}.stab.active .dot{background:rgba(255,255,255,.7)}
.stab .rm{margin-left:2px;opacity:.5;font-size:14px;line-height:1}.tab-add{border-style:dashed;color:var(--tf)}
.main{flex:1;padding:16px}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:10px}
.all-stores-total{background:linear-gradient(135deg,var(--p),var(--gd));border-radius:var(--rs);padding:12px 16px;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;gap:8px}
.all-stores-total .ast-label{font-size:12px;font-weight:600;color:rgba(255,255,255,.85)}
.all-stores-total .ast-value{font-size:20px;font-weight:800;color:#fff}
.all-stores-total .ast-stores{display:flex;gap:6px;flex-wrap:wrap;margin-top:4px}
.all-stores-total .ast-chip{font-size:10px;background:rgba(255,255,255,.2);color:#fff;border-radius:10px;padding:2px 7px}
.stat{background:var(--sf);border-radius:var(--ra);padding:12px 14px;box-shadow:var(--sh)}
.stat-label{font-size:10px;color:var(--tm);margin-bottom:2px;font-weight:500}
.stat-value{font-size:14px;font-weight:700}.stat-value.green{color:var(--g)}.stat-value.red{color:var(--r)}
.toolbar{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.sw{flex:1;min-width:120px;position:relative}
.sw select{width:100%;height:40px;padding:0 12px 0 36px;border:1.5px solid var(--bd);border-radius:var(--rs);background:var(--sf);color:var(--tx);font-size:14px;outline:none;appearance:none;-webkit-appearance:none;cursor:pointer}
.sw select:focus{border-color:var(--g)}.si{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--tf);font-size:16px;pointer-events:none}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:5px;height:40px;padding:0 14px;border-radius:var(--rs);font-size:13px;font-weight:600;cursor:pointer;border:1.5px solid transparent;transition:all .15s;white-space:nowrap}
.btn-p{background:var(--g);color:#fff;border-color:var(--g)}.btn-p:hover{background:var(--gd)}.btn-p:disabled{opacity:.4;pointer-events:none}
.btn-g{background:var(--sf);color:var(--tm);border-color:var(--bd)}.btn-g:hover{background:var(--bg)}
.notice{display:flex;align-items:center;gap:8px;padding:10px 14px;border-radius:var(--rs);font-size:13px;margin-bottom:14px}
.notice.editor{background:var(--gl);color:var(--gd)}.notice.viewer{background:var(--grl);color:var(--gr)}
.cards{display:flex;flex-direction:column;gap:10px}
.card{background:var(--sf);border-radius:var(--ra);padding:14px;box-shadow:var(--sh)}
.card-hdr{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;gap:8px}
.card-body{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.cf{background:var(--bg);border-radius:var(--rs);padding:8px 10px}
.cf-label{font-size:10px;color:var(--tf);font-weight:500;margin-bottom:2px;text-transform:uppercase;letter-spacing:.3px}
.cf-value{font-size:15px;font-weight:700}.cf-value.green{color:var(--g)}
.card-ftr{display:flex;justify-content:space-between;align-items:center;margin-top:10px;padding-top:10px;border-top:1px solid var(--bd)}
.btn-sm{display:inline-flex;align-items:center;gap:4px;height:32px;padding:0 10px;border-radius:var(--rs);font-size:12px;font-weight:600;cursor:pointer;border:1.5px solid var(--bd);background:var(--sf);color:var(--tm);transition:all .15s}
.btn-sm:hover{background:var(--bg)}.btn-sm.danger{color:var(--r);border-color:var(--rl);background:var(--rl)}
.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700}
.badge.ok{background:var(--gl);color:var(--gd)}.badge.out{background:var(--rl);color:var(--r)}
.thumb{width:64px;height:64px;border-radius:10px;object-fit:cover;background:var(--bg);border:1px solid var(--bd);flex-shrink:0;cursor:pointer}
.thumb-ph{width:64px;height:64px;border-radius:10px;background:var(--bg);border:1.5px dashed var(--bds);display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0;color:var(--tf)}
.thumb-s{width:36px;height:36px;border-radius:8px;object-fit:cover;background:var(--bg);border:1px solid var(--bd);vertical-align:middle}
.thumb-sph{width:36px;height:36px;border-radius:8px;background:var(--bg);border:1.5px dashed var(--bd);display:inline-flex;align-items:center;justify-content:center;font-size:16px;vertical-align:middle;color:var(--tf)}
.img-area{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.img-prev{width:72px;height:72px;border-radius:12px;object-fit:cover;border:1px solid var(--bd)}
.img-ph{width:72px;height:72px;border-radius:12px;background:var(--bg);border:2px dashed var(--bds);display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:22px;color:var(--tf);cursor:pointer;flex-shrink:0}
.img-ph:hover{border-color:var(--g)}.img-btns{display:flex;flex-direction:column;gap:6px}.img-btns p{font-size:11px;color:var(--tf)}
.empty{text-align:center;padding:40px 20px;color:var(--tf)}.empty-icon{font-size:36px;margin-bottom:12px}
.tbl-wrap{display:none;background:var(--sf);border-radius:var(--ra);box-shadow:var(--sh);overflow:hidden}
.tbl-wrap table{width:100%;border-collapse:collapse}
.tbl-wrap th{font-size:11px;font-weight:700;color:var(--tm);padding:8px 10px;border-bottom:1px solid var(--bd);text-align:left;text-transform:uppercase;letter-spacing:.4px;background:var(--bg)}
.tbl-wrap th.r{text-align:right}.tbl-wrap td{font-size:13px;padding:8px 10px;border-bottom:1px solid var(--bd);vertical-align:middle}
.tbl-wrap td.r{text-align:right}.tbl-wrap tr:last-child td{border-bottom:none}.tbl-wrap tr:hover td{background:var(--bg)}
.tbl-wrap .total-row td{font-weight:700;background:var(--bg)}.tlabel{font-size:11px;color:var(--tf)}
.tbl-wrap tr.done-row td{background:#fffde7}.tbl-wrap tr.done-row:hover td{background:#fff9c4}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:500;display:flex;align-items:flex-end;justify-content:center}
.modal{background:var(--sf);border-radius:20px 20px 0 0;width:100%;max-width:480px;padding:20px 20px 32px;max-height:90vh;overflow-y:auto}
.modal-handle{width:36px;height:4px;background:var(--bds);border-radius:2px;margin:0 auto 16px}
.modal h2{font-size:18px;font-weight:700;margin-bottom:16px}
.fr{margin-bottom:14px}.fr label{display:block;font-size:12px;font-weight:600;color:var(--tm);margin-bottom:5px;text-transform:uppercase;letter-spacing:.3px}
.fr input,.fr select{width:100%;height:44px;padding:0 12px;border:1.5px solid var(--bd);border-radius:var(--rs);background:var(--bg);color:var(--tx);font-size:15px;outline:none;appearance:none;-webkit-appearance:none}
.fr input:focus,.fr select:focus{border-color:var(--g);background:var(--sf)}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.prev-box{background:var(--gl);border-radius:var(--rs);padding:12px 14px;display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.prev-box span{font-size:12px;color:var(--gd);font-weight:600}.prev-box strong{font-size:18px;color:var(--g);font-weight:800}
.fa{display:flex;gap:10px}.fa .btn{flex:1;height:48px;font-size:15px}
.upd-banner{display:none;position:fixed;bottom:16px;left:50%;transform:translateX(-50%);z-index:300;background:var(--sf);border:1.5px solid var(--g);border-radius:var(--ra);box-shadow:var(--shm);padding:12px 16px;align-items:center;gap:12px;min-width:280px;max-width:90vw}
.upd-banner.show{display:flex}.upd-dot{width:8px;height:8px;border-radius:50%;background:var(--g);flex-shrink:0;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}.upd-banner p{font-size:13px;font-weight:600;color:var(--tx);flex:1}
.inline-input{width:88px;height:36px;padding:0 6px;border:2px solid var(--g);border-radius:var(--rs);background:var(--sf);color:var(--tx);font-size:15px;font-weight:700;outline:none;text-align:right;-moz-appearance:textfield}
.inline-input::-webkit-inner-spin-button,.inline-input::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}
.inline-input:focus{box-shadow:0 0 0 3px rgba(29,158,117,0.15)}
.cf-input{width:100%;height:52px;padding:0 8px;border:2px solid var(--g);border-radius:var(--rs);background:var(--sf);color:var(--tx);font-size:20px;font-weight:700;outline:none;text-align:center}
.cf-input:focus{box-shadow:0 0 0 3px rgba(29,158,117,0.15)}
@media(min-width:640px){.hdr{padding:14px 24px}.hdr-h1{display:block!important;font-size:19px}.main{padding:20px 24px}.cards{display:none}.tbl-wrap{display:block}.overlay{align-items:center}.modal{border-radius:16px;padding:24px}.modal-handle{display:none}}
</style>
</head>
<body>

<div class="upd-banner" id="upd-banner">
  <div class="upd-dot"></div>
  <p>新しいバージョンがあります</p>
  <button class="btn btn-p" style="height:32px;font-size:12px;padding:0 12px" onclick="doUpdate()">今すぐ更新</button>
  <button class="btn btn-g" style="height:32px;font-size:12px;padding:0 10px" onclick="document.getElementById('upd-banner').classList.remove('show')">後で</button>
</div>

<div class="app">
  <div class="hdr">
    <div class="hdr-in">
      <div class="hdr-title">
        <div class="hdr-icon">
          <svg viewBox="0 0 48 48" width="20" height="20" xmlns="http://www.w3.org/2000/svg">
            <rect x="8" y="22" width="32" height="20" rx="2" fill="#C8893A"/>
            <polygon points="8,22 4,18 4,38 8,42" fill="#A86B28"/>
            <polygon points="8,22 24,22 24,10 8,13" fill="#F0B050"/>
            <polygon points="40,22 24,22 24,10 40,13" fill="#D49838"/>
            <polygon points="40,22 44,18 44,38 40,42" fill="#A86B28"/>
            <line x1="24" y1="22" x2="24" y2="42" stroke="#A86B28" stroke-width="1" opacity="0.5"/>
            <rect x="8" y="29" width="32" height="4" rx="1" fill="#E8C97A" opacity="0.7"/>
          </svg>
        </div>
        <h1 class="hdr-h1">在庫管理</h1>
      </div>
      <div class="hdr-ctrl">
        <button class="line-share-btn" onclick="shareToLine()">🔗 リンクをコピー</button>
        <div class="role-switcher">
          <button class="role-pill admin" id="role-btn-admin" onclick="switchRole('admin')">🛡 管理者</button>
          <button class="role-pill editor" id="role-btn-editor" onclick="switchRole('editor')">✏️ 編集者</button>
          <button class="role-pill viewer" id="role-btn-viewer" onclick="switchRole('viewer')">👁 閲覧者</button>
        </div>
        <button id="undo-btn" class="btn-sm" style="width:34px;padding:0;justify-content:center;font-size:18px;opacity:0.35" title="">↩️</button><button class="btn-sm" onclick="openSettings()" style="width:34px;padding:0;justify-content:center;font-size:20px;color:#fff;background:#555;border-color:#444">⚙️</button>
      </div>
    </div>
  </div>
  <div class="store-bar"><div class="store-tabs" id="store-tabs"></div></div>
  <div class="main">
    <div id="notice-area"></div>
    <div id="all-stores-total-area"></div>
    <div class="stats" id="stats"></div>
    <div class="toolbar">
      <div class="sw" style="min-width:140px;flex:1"><span class="si">🔍</span><input id="search-text" type="search" placeholder="商品名で検索" style="width:100%;height:46px;padding:0 12px 0 36px;border:1.5px solid var(--bd);border-radius:var(--rs);background:var(--sf);color:var(--tx);font-size:16px;font-weight:600;outline:none;-webkit-appearance:none" oninput="debouncedRender()" onfocus="this.style.borderColor='var(--g)'" onblur="this.style.borderColor='var(--bd)'"></div>
      <button class="btn btn-g" id="cat-filter-btn" onclick="openCatModal2()" style="height:46px;font-size:15px;font-weight:700;gap:4px;white-space:nowrap;flex-shrink:0">🏷 <span id="cat-filter-label">カテゴリー</span></button>
      <input type="hidden" id="search" value="">
      <button class="btn btn-p" id="btn-add" onclick="openItemModal()" style="height:46px;font-size:15px;font-weight:700;padding:0 16px">＋ 追加</button>
      <button class="btn" id="btn-complete" onclick="completeInventory()" style="background:#FF9800;color:#fff;border-color:#FF9800;white-space:nowrap;height:46px;font-size:15px;font-weight:700;padding:0 16px">✅ 棚卸完了</button>
      <button class="btn btn-g" id="btn-cat" onclick="openCatModal()">🏷</button>
      <button class="btn btn-g" id="btn-export" onclick="openExportModal()">📊</button>
    </div>
    <div class="cards" id="cards"></div>
    <div class="tbl-wrap">
      <table>
        <thead><tr>
          <th>商品名</th><th>カテゴリ</th><th class="r">現在庫</th><th>単位</th>
          <th class="r" id="th-price">仕入単価</th><th class="r" id="th-val">在庫金額</th>
          <th>状態</th><th>更新日時</th><th id="th-act"></th>
        </tr></thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </div>
</div>

<input type="file" id="global-import" accept=".json,.txt" style="display:none" onchange="importBackup(event)">

<div class="overlay" id="overlay" style="display:none" onclick="handleOvClick(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-handle"></div>
    <div id="modal-content"></div>
  </div>
</div>

<script>
// ============================================================
// 定数（最初に全て定義）
// ============================================================
const APP_VERSION   = '4.2.0';
const DATA_VERSION  = '20260524_02'; // データ更新時にここを変える
const STORAGE_KEY   = 'zaikoApp_v1';

function nowStr(){ return new Date().toLocaleString('ja-JP',{year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'}); }
function fmt(n){ return parseFloat(n.toFixed(2)).toLocaleString('ja-JP',{minimumFractionDigits:0,maximumFractionDigits:2}); }
function yen(n){ return '¥'+fmt(n); }
function storeColor(id){ const i=stores.findIndex(s=>s.id===id); return STORE_COLORS[i%STORE_COLORS.length]; }
function getCategories(){
  // 未登録の店舗IDは空リストを自動作成して返す（デフォルト店舗1にフォールバックしない）
  if(!STORE_CATEGORIES[currentStoreId]){
    STORE_CATEGORIES[currentStoreId]=[];
    saveData();
  }
  return STORE_CATEGORIES[currentStoreId];
}
function esc(s){
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function saveData(){
  try{
    const p=JSON.stringify({stores,allItems,nextStoreId,nextItemId,currentStoreId,currentRole,savedAt:new Date().toISOString()});
    localStorage.setItem(STORAGE_KEY,p);
    localStorage.setItem(BACKUP_KEY,p);
    // カテゴリーは別キーで保存
    localStorage.setItem(CAT_KEY,JSON.stringify(STORE_CATEGORIES));
  }catch(e){
    if(e.name==='QuotaExceededError'||e.code===22){
      // 画像なしで再試行
      try{
        const noImg={stores,allItems:allItems.map(i=>({...i,image:''})),nextStoreId,nextItemId,currentStoreId,currentRole,savedAt:new Date().toISOString()};
        localStorage.setItem(STORAGE_KEY,JSON.stringify(noImg));
        localStorage.setItem(BACKUP_KEY,JSON.stringify(noImg));
        showToast('⚠️ 容量不足のため画像を除いて保存しました。設定 → バックアップで画像なしデータを保存できます。','#E24B4A');
      } catch(e2){
        showToast('❌ 保存に失敗しました。ブラウザのキャッシュを削除してください。','#E24B4A');
      }
    } else {
      console.warn('保存失敗',e);
    }
  }
}

function loadData(){
  // カテゴリーを読み込む
  try{
    const catRaw=localStorage.getItem(CAT_KEY);
    if(catRaw) STORE_CATEGORIES=JSON.parse(catRaw);
  }catch(e){}

  for(const key of[STORAGE_KEY,BACKUP_KEY]){
    try{
      const raw=localStorage.getItem(key); if(!raw) continue;
      const d=JSON.parse(raw); if(!d.stores||!d.allItems) continue;
      stores         = d.stores;
      allItems       = d.allItems;
      nextStoreId    = d.nextStoreId    || 5;
      nextItemId     = d.nextItemId     || NEXT_ITEM_ID;
      currentStoreId = d.currentStoreId || 1;
      // ロールは既知の値のみ許可（改ざん防止）
      const savedRole = d.currentRole;
      currentRole    = (savedRole==='admin'||savedRole==='editor'||savedRole==='viewer') ? savedRole : 'editor';
      if(key!==STORAGE_KEY) saveData();
      return true;
    }catch(e){continue;}
  }
  return false;
}

// ============================================================
// ロール切り替え（管理者はPW必須）
// ============================================================
async function hashPw(pw){
  const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(pw));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}
async function getRolePwHash(){
  const stored=localStorage.getItem(ROLE_PW_KEY);
  if(stored&&stored.length===64) return stored; // すでにハッシュ済み
  // 平文またはデフォルトの場合はハッシュ化して保存
  const pw=stored||DEFAULT_PW;
  const h=await hashPw(pw);
  localStorage.setItem(ROLE_PW_KEY,h);
  return h;
}

  const bc=document.getElementById('btn-complete');

}

const ANNUAL_KEY = 'zaikoApp_annual'; // 年度別棚卸データ

function completeInventory(){
  const storeName = stores.find(s=>s.id===currentStoreId)?.name||'';
  const fiscal = getFiscalLabel().split('_')[0]; // 例: 2027年3月期
  if(!confirm(storeName+'の棚卸を完了してExcelに保存しますか？\n\n年度: '+fiscal)){return;}

  // 1. Excelを自動出力
  doExport(currentStoreId);

  // 2. 年度別データに保存
  try{
    const annual = JSON.parse(localStorage.getItem(ANNUAL_KEY)||'{}');
    if(!annual[fiscal]) annual[fiscal]={};
    annual[fiscal][currentStoreId]={
      storeId: currentStoreId,
      storeName: storeName,
      fiscal: fiscal,
      savedAt: nowStr(),
      items: allItems.filter(i=>i.storeId===currentStoreId).map(i=>({
        id:i.id, name:i.name, cat:i.cat, qty:i.qty, unit:i.unit, price:i.price
      }))
    };
    // 最大10年分保持
    const years = Object.keys(annual).sort();
    if(years.length>10) delete annual[years[0]];
    localStorage.setItem(ANNUAL_KEY, JSON.stringify(annual));
    showToast('✅ '+storeName+'の棚卸を完了しました（'+fiscal+'）');
  }catch(e){
    showToast('⚠️ 年度データの保存に失敗しました','#E24B4A');
  }
}

    return;

  const rows = storeEntries.map(s=>{
    const total = s.items.reduce((sum,i)=>sum+i.qty*i.price,0);
    const itemCount = s.items.length;
    return`<div style="background:var(--bg);border-radius:8px;padding:10px 12px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between">

      onclick="exportAnnualAll('${fiscal}')">📊 全店舗まとめてExcel出力</button>`;

function exportAnnual(fiscal, storeId){
  const annual = JSON.parse(localStorage.getItem(ANNUAL_KEY)||'{}');
  const storeData = annual[fiscal]?.[storeId];

function saveInventoryHistory(){
  try{
    const histories = JSON.parse(localStorage.getItem(HISTORY_KEY)||'[]');
    const snapshot = {
      date: nowStr(),
      dateKey: new Date().toLocaleDateString('ja-JP',{year:'numeric',month:'2-digit'}).replace(/\//g,'-'),
      items: allItems.map(i=>({id:i.id, storeId:i.storeId, name:i.name, cat:i.cat, qty:i.qty, price:i.price, unit:i.unit}))
    };
    // 同じ月のデータは上書き
    const idx = histories.findIndex(h=>h.dateKey===snapshot.dateKey);
    if(idx>=0) histories[idx]=snapshot; else histories.push(snapshot);
    // 最大24ヶ月分保持
    if(histories.length>24) histories.shift();
    localStorage.setItem(HISTORY_KEY, JSON.stringify(histories));
    showToast('✅ 棚卸履歴を保存しました（'+snapshot.dateKey+'）');
  }catch(e){ showToast('❌ 履歴保存に失敗しました','#E24B4A'); }
}

function openHistoryModal(){
  const histories = JSON.parse(localStorage.getItem(HISTORY_KEY)||'[]');
  if(histories.length<1){
    document.getElementById('modal-content').innerHTML=`
      <h2>📅 棚卸履歴</h2>
      <div style="text-align:center;padding:32px;color:var(--tf)">
        <div style="font-size:32px;margin-bottom:8px">📭</div>
        <div>履歴がまだありません。<br>棚卸完了後に「履歴を保存」してください。</div>
      </div>
      <div class="fa"><button class="btn btn-g" onclick="closeModal()">閉じる</button></div>`;
    openOverlay(); return;
  }

  // 最新2件を比較
  const latest = histories[histories.length-1];
  const prev   = histories.length>=2 ? histories[histories.length-2] : null;

  // 店舗選択タブ
  const storeTabs = stores.map((s,i)=>
    `<button class="stab${i===0?' active':''}" onclick="renderHistoryStore(${s.id},this)" style="font-size:12px;padding:6px 12px">${esc(s.name)}</button>`
  ).join('');

  document.getElementById('modal-content').innerHTML=`
    <h2>📅 棚卸履歴</h2>
    <div style="font-size:12px;color:var(--tm);margin-bottom:10px">
      最新: ${latest.dateKey}${prev?' ／ 前回: '+prev.dateKey:''}
    </div>
    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px">${storeTabs}</div>
    <div id="hist-content" style="overflow-y:auto;max-height:50vh"></div>
    <div class="fa" style="margin-top:12px">
      <button class="btn btn-g" onclick="closeModal()">閉じる</button>
    </div>`;

  window._histLatest = latest;
  window._histPrev   = prev;
  renderHistoryStore(stores[0]?.id||1, null);
  openOverlay();
}

function renderHistoryStore(storeId, btn){
  // タブのアクティブ切替
  if(btn){
    document.querySelectorAll('#modal-content .stab').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
  }
  const latest = window._histLatest;
  const prev   = window._histPrev;
  const items  = latest.items.filter(i=>i.storeId===storeId);
  if(!items.length){
    document.getElementById('hist-content').innerHTML=`<div style="text-align:center;padding:20px;color:var(--tf)">この店舗のデータがありません</div>`;
    return;
  }

  // 合計金額
  const totalNow  = items.reduce((s,i)=>s+i.qty*i.price, 0);
  const prevItems = prev ? prev.items.filter(i=>i.storeId===storeId) : [];
  const totalPrev = prevItems.reduce((s,i)=>s+i.qty*i.price, 0);
  const totalDiff = totalNow - totalPrev;

  const summaryHtml = prev ? `
    <div style="display:flex;gap:8px;margin-bottom:12px">
      <div style="flex:1;background:var(--bg);border-radius:8px;padding:10px;text-align:center">
        <div style="font-size:10px;color:var(--tm)">前回</div>
        <div style="font-size:14px;font-weight:700">${yen(totalPrev)}</div>
      </div>
      <div style="flex:1;background:var(--bg);border-radius:8px;padding:10px;text-align:center">
        <div style="font-size:10px;color:var(--tm)">今回</div>
        <div style="font-size:14px;font-weight:700">${yen(totalNow)}</div>
      </div>
      <div style="flex:1;background:${totalDiff>0?'#E8F8F2':totalDiff<0?'#FEE':'var(--bg)'};border-radius:8px;padding:10px;text-align:center">
        <div style="font-size:10px;color:var(--tm)">増減</div>
        <div style="font-size:14px;font-weight:700;color:${totalDiff>0?'#1D9E75':totalDiff<0?'#E24B4A':'var(--tf)'}">${totalDiff>0?'+':''}${yen(totalDiff)}</div>
      </div>
    </div>` : `
    <div style="background:var(--bg);border-radius:8px;padding:10px;text-align:center;margin-bottom:12px">
      <div style="font-size:12px;color:var(--tm)">今回合計</div>
      <div style="font-size:18px;font-weight:700">${yen(totalNow)}</div>
    </div>`;

  const rows = items.map(i=>{
    const p = prevItems.find(p=>p.id===i.id);
    const diff = p ? i.qty - p.qty : null;
    const diffHtml = diff===null ? '<span class="hist-badge same">初回</span>'
      : diff>0 ? `<span class="hist-badge up">+${fmt(diff)}</span>`
      : diff<0 ? `<span class="hist-badge down">${fmt(diff)}</span>`
      : '<span class="hist-badge same">±0</span>';
    return `<tr>
      <td>${esc(i.name)}</td>
      <td class="r">${fmt(i.qty)} ${esc(i.unit)}</td>
      <td class="r">${diffHtml}</td>
    </tr>`;
  }).join('');

  document.getElementById('hist-content').innerHTML = summaryHtml +
    `<table class="hist-table">
      <thead><tr><th>商品名</th><th class="r">在庫数</th><th class="r">前回比</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
}

// ============================================================
// インライン編集
// ============================================================
function inlineUpdate(id,field,val){
  const item=allItems.find(i=>i.id===id); if(!item) return;
  const num=parseFloat(val); if(isNaN(num)||num<0) return;
  if(item[field]===num) return;
  // Undo用に変更前の状態を記録
  _undoStack.push({id,field,prev:item[field],next:num,name:item.name});
  if(_undoStack.length>20) _undoStack.shift(); // 最大20件
  updateUndoBtn();
  item[field]=num; item.updatedAt=nowStr(); saveData();
  const el=document.getElementById(`val-${id}`); if(el) el.textContent=yen(item.qty*item.price);
  const elc=document.getElementById(`cval-${id}`); if(elc) elc.textContent=yen(item.qty*item.price);
  updateStats();
  updateAllStoresTotal();
  // Undoボタンをrender後に再適用（DOMが残っている場合も確実に有効化）
  updateUndoBtn();
}

function inlineKeydown(e, id, field, el){
  if(e.key !== 'Enter') return;
  e.preventDefault();
  // 全入力欄を取得してカーソル位置を記憶
  const all = Array.from(document.querySelectorAll(`.inline-input[data-field="${field}"]`));
  const idx = all.indexOf(el);
  // 値を保存（再描画なし）
  const item = allItems.find(i=>i.id===id);
  if(item){
    const num = parseFloat(el.value);
    if(!isNaN(num) && num >= 0 && item[field] !== num){
      _undoStack.push({id, field, prev:item[field], next:num, name:item.name});
      if(_undoStack.length>20) _undoStack.shift();
      updateUndoBtn();
      item[field] = num; item.updatedAt = nowStr(); saveData();
      const valEl = document.getElementById(`val-${id}`);
      if(valEl) valEl.textContent = yen(item.qty*item.price);
      const cvalEl = document.getElementById(`cval-${id}`);
      if(cvalEl) cvalEl.textContent = yen(item.qty*item.price);
      updateStats(); updateAllStoresTotal();
      // 入力済み行をテーブル末尾（合計行の前）に移動＆薄黄色に
      const tbody = document.getElementById('tbody');
      if(tbody){
        const row = el.closest('tr');
        const totalRow = tbody.querySelector('.total-row');
        if(row && totalRow && row !== totalRow){
          row.classList.add('done-row');
          tbody.insertBefore(row, totalRow);
        }
      }
    }
  }
  // カーソルは同じ位置（idx）をキープ
  const newAll = Array.from(document.querySelectorAll(`.inline-input[data-field="${field}"]`));
  const target = newAll[idx] || newAll[newAll.length - 2]; // 合計行除く最後
  if(target){ target.focus(); target.select(); }
}

function undoLast(){
  if(!_undoStack.length) return;
  const u=_undoStack.pop();
  const item=allItems.find(i=>i.id===u.id); if(!item) return;
  // done・qty・price すべてのフィールドに対応
  if(u.field==='done'){
    // 完了操作を1回で完全に戻す
    item.done=false;
  } else {
    item[u.field]=u.prev;
  }
  // 戻した商品を一番上に表示するため updatedAt を現在時刻に
  item.updatedAt=nowStr();
  saveData();
  updateUndoBtn();
  updateStats();
  updateAllStoresTotal();
  // 戻した商品の店舗に切り替え
  if(currentStoreId!==item.storeId){
    currentStoreId=item.storeId;
    renderTabs();
  }
  // フィルタをリセットして必ず表示されるようにする
  _selectedCat=''; const sel=document.getElementById('search'); if(sel) sel.value=''; const lbl=document.getElementById('cat-filter-label'); if(lbl) lbl.textContent='カテゴリー'; const btn=document.getElementById('cat-filter-btn'); if(btn){btn.style.borderColor='var(--bd)';btn.style.color='var(--tm)';btn.style.background='var(--sf)';}
  const st=document.getElementById('search-text'); if(st) st.value='';
  // トースト文言を操作種別で分ける
  const label = u.field==='done' ? '完了操作' : u.field==='qty' ? '在庫数' : '単価';
  const detail = u.field==='done' ? `完了 → 未完了` : `${u.next} → ${u.prev}`;
  showToast(`↩️ ${u.name}の${label}を戻しました（${detail}）`, '#5B8DEF');
  render();
}

function updateUndoBtn(){
  const btn=document.getElementById('undo-btn');
  if(!btn) return;
  // disabled属性はクリックを完全にブロックするためCSSのみで制御
  btn.removeAttribute('disabled');
  if(_undoStack.length>0){
    const u=_undoStack[_undoStack.length-1];
    btn.title=`${u.name}の${u.field==='qty'?'在庫数':'単価'}: ${u.next}→${u.prev}`;
    btn.style.opacity='1';
    btn.style.pointerEvents='auto';
    btn.style.cursor='pointer';
  } else {
    btn.title='戻る操作がありません';
    btn.style.opacity='0.35';
    btn.style.pointerEvents='none';
    btn.style.cursor='default';
  }
}

// 描画
// ============================================================
function render(){
  const r=ROLES[currentRole];
  const cats=getCategories();
  // カテゴリー選択値を取得（カスタムドロップダウン対応）
  const cur=_selectedCat||'';
  const textQ=(document.getElementById('search-text')?.value||'').trim().toLowerCase();
  const si=allItems.filter(i=>i.storeId===currentStoreId);
  const usedCats=[...new Set(si.map(i=>i.cat))];
  // 選択中カテゴリーが存在しない場合はリセット
  if(cur && !usedCats.includes(cur)){ _selectedCat=''; document.getElementById('search').value=''; const lbl3=document.getElementById('cat-filter-label'); if(lbl3) lbl3.textContent='カテゴリー'; }

  const filtered=[...si]
    .filter(i=>!cur||i.cat===cur)
    .filter(i=>!textQ||i.name.toLowerCase().includes(textQ)||i.cat.toLowerCase().includes(textQ))
    .sort((a,b)=>{
      // グループ: 0=在庫あり(上), 1=在庫切れ(下), 2=完了済み(最下)
      const aGrp = a.done ? 2 : (a.qty===0 ? 1 : 0);
      const bGrp = b.done ? 2 : (b.qty===0 ? 1 : 0);
      if(aGrp!==bGrp) return aGrp-bGrp;
      // 同グループ内: 更新日時の新しい順（最近入力したものを上に）
      return (b.updatedAt||'').localeCompare(a.updatedAt||'');
    });
  const totalVal=filtered.reduce((s,i)=>s+i.qty*i.price,0);

  // モバイルカード
  const cards=document.getElementById('cards');
  if(!filtered.length){
    cards.innerHTML=`<div class="empty"><div class="empty-icon">📦</div><p>${si.length===0?'この店舗にはまだ商品がありません':(textQ?`「${esc(textQ)}」に一致する商品がありません`:'このカテゴリーに商品がありません')}</p></div>`;
  } else {
    cards.innerHTML=filtered.map(i=>{
      const isOut=i.qty===0;
      const isDone=!!i.done;
      const badge=isDone
        ?`<span class="badge" style="background:#E8F4FD;color:#1565C0">✅ 完了</span>`
        :isOut?`<span class="badge out">在庫切れ</span>`:`<span class="badge ok">在庫あり</span>`;
      const th=i.image?`<img class="thumb" src="${esc(i.image)}" alt="" onclick="openLightbox('${i.id}')" style="cursor:pointer">`:`<div class="thumb-ph">📦</div>`;
      const cardStyle=isDone?`style="background:#FFFDE7;border:1.5px solid #FFF176"`:'';
      const qtyF=r.canEdit
        ?`<div class="cf"><div class="cf-label">在庫数</div><input class="cf-input" type="number" min="0" step="0.01" inputmode="decimal" value="${i.qty}" onblur="inlineUpdate(${i.id},'qty',this.value)" onfocus="this.select()"><span style="font-size:12px;color:var(--tm);margin-top:2px">${i.unit}</span></div>`
        :`<div class="cf"><div class="cf-label">在庫数</div><div class="cf-value">${fmt(i.qty)} ${esc(i.unit)}</div></div>`;
      const priceF=r.seePrice&&r.canEdit
        ?`<div class="cf"><div class="cf-label">仕入単価</div><input class="cf-input" type="number" min="0" step="0.01" inputmode="decimal" value="${i.price}" onblur="inlineUpdate(${i.id},'price',this.value)" onfocus="this.select()"></div>`
        :r.seePrice?`<div class="cf"><div class="cf-label">仕入単価</div><div class="cf-value">${yen(i.price)}</div></div>`:'';
      const valF=r.seePrice?`<div class="cf"><div class="cf-label">在庫金額</div><div style="font-size:12px;font-weight:600;color:var(--g)" id="cval-${i.id}">${yen(i.qty*i.price)}</div></div>`:'';
      const doneBtn=r.canEdit
        ? isDone
          ? `<button class="btn-sm" onclick="toggleDone(${i.id})" style="color:var(--g);border-color:var(--g)">↩ 戻す</button>`
          : `<button class="btn-sm" onclick="toggleDone(${i.id})" style="background:#E8F4FD;color:#1565C0;border-color:#90CAF9">✅ 完了</button>`
        : '';
      const act=(r.canEdit||r.canDelete)?`<div style="display:flex;gap:6px;flex-wrap:wrap">${doneBtn}${r.canEdit?`<button class="btn-sm" onclick="openItemModal(${i.id})">✏️ 編集</button>`:''}${r.canDelete?`<button class="btn-sm danger" onclick="deleteItem(${i.id})">🗑</button>`:''}</div>`:'';
      return`<div class="card" ${cardStyle}><div class="card-hdr"><div style="display:flex;align-items:center;gap:10px;flex:1;min-width:0">${th}<div style="min-width:0"><div style="font-weight:700;font-size:15px">${esc(i.name)}</div><div style="font-size:12px;color:var(--tm)">${esc(i.cat)}</div></div></div>${badge}</div><div class="card-body">${qtyF}${priceF}${valF}</div><div class="card-ftr"><span class="tlabel">🕐 ${esc(i.updatedAt)}</span>${act}</div></div>`;
    }).join('');
  }

  // PCテーブル
  document.getElementById('th-price').style.display=r.seePrice?'':'none';
  document.getElementById('th-val').style.display=r.seePrice?'':'none';
  document.getElementById('th-act').textContent=(r.canEdit||r.canDelete)?'操作':'';
  const rows=filtered.map(i=>{
    const isOut=i.qty===0;
    const isDone=!!i.done;
    const badge=isDone
      ?`<span class="badge" style="background:#E8F4FD;color:#1565C0">✅ 完了</span>`
      :isOut?`<span class="badge out">在庫切れ</span>`:`<span class="badge ok">在庫あり</span>`;
    const rowStyle=isDone?` style="background:#FFFDE7"`:'';
    const th=i.image?`<img class="thumb-s" src="${esc(i.image)}" alt="" style="margin-right:8px;cursor:pointer" onclick="openLightbox('${i.id}')">`:`<span class="thumb-sph" style="margin-right:8px">📦</span>`;
    const qtyTd=r.canEdit?`<td class="r"><input class="inline-input" type="number" min="0" step="0.01" inputmode="decimal" value="${i.qty}" data-id="${i.id}" data-field="qty" onblur="inlineUpdate(${i.id},'qty',this.value)" onkeydown="inlineKeydown(event,${i.id},'qty',this)" onfocus="this.select()"></td>`:`<td class="r" style="font-weight:700">${fmt(i.qty)}</td>`;
    const priceTd=r.seePrice&&r.canEdit?`<td class="r"><input class="inline-input" type="number" min="0" step="0.01" inputmode="decimal" value="${i.price}" data-id="${i.id}" data-field="price" onblur="inlineUpdate(${i.id},'price',this.value)" onkeydown="inlineKeydown(event,${i.id},'price',this)" onfocus="this.select()"></td>`:r.seePrice?`<td class="r">${yen(i.price)}</td>`:`<td style="display:none"></td>`;
    const valTd=r.seePrice?`<td class="r" style="font-weight:700;color:var(--g)" id="val-${i.id}">${yen(i.qty*i.price)}</td>`:`<td style="display:none"></td>`;
    const doneBtn=r.canEdit
      ? isDone
        ? `<button class="btn-sm" onclick="toggleDone(${i.id})" style="color:var(--g);border-color:var(--g)">↩</button>`
        : `<button class="btn-sm" onclick="toggleDone(${i.id})" style="background:#E8F4FD;color:#1565C0;border-color:#90CAF9">✅</button>`
      : '';
    const ac=(r.canEdit||r.canDelete)?`<td style="text-align:right;white-space:nowrap">${doneBtn}${r.canEdit?`<button class="btn-sm" onclick="openItemModal(${i.id})" style="margin-left:4px">✏️</button>`:''}${r.canDelete?`<button class="btn-sm danger" onclick="deleteItem(${i.id})" style="margin-left:4px">🗑</button>`:''}</td>`:`<td></td>`;
    return`<tr${rowStyle}><td style="font-weight:700"><div style="display:flex;align-items:center">${th}${esc(i.name)}</div></td><td style="color:var(--tm)">${esc(i.cat)}</td>${qtyTd}<td style="color:var(--tm)">${esc(i.unit)}</td>${priceTd}${valTd}<td>${badge}</td><td class="tlabel">${esc(i.updatedAt)}</td>${ac}</tr>`;

function toggleDone(id){
  const item=allItems.find(i=>i.id===id); if(!item) return;
  if(!item.done){
    // 同じ商品の直前のqty/price変更をスタックから除去して完了操作1件に集約
    // （在庫入力→完了を1回のUndoで戻せるようにする）
    while(_undoStack.length>0 && _undoStack[_undoStack.length-1].id===id && _undoStack[_undoStack.length-1].field!=='done'){
      _undoStack.pop();
    }
    _undoStack.push({id, field:'done', prev:false, next:true, name:item.name});
    if(_undoStack.length>20) _undoStack.shift();
    updateUndoBtn();
  }
  item.done=!item.done;
  item.updatedAt=nowStr();
  saveData();
  render();
  if(item.done) showToast('✅ 完了しました！一番下に移動します');
}

function addCat(){
  const inp=document.getElementById('new-cat-inp');
  const name=inp.value.trim();
  if(!name) return;
  if(!STORE_CATEGORIES[currentStoreId]) STORE_CATEGORIES[currentStoreId]=[];
  if(STORE_CATEGORIES[currentStoreId].includes(name)){alert('同じ名前のカテゴリーが既にあります');return;}
  STORE_CATEGORIES[currentStoreId].push(name);
  inp.value=''; // 入力欄をクリア
  saveData(); renderCatModal();
  // カテゴリー検索ボタンのモーダルも更新
  const si=allItems.filter(i=>i.storeId===currentStoreId);
  window._catModalCats=[...new Set(si.map(i=>i.cat))].filter(Boolean).sort();
  window._catModalCounts={};
  window._catModalCats.forEach(c=>{window._catModalCounts[c]=si.filter(i=>i.cat===c).length;});
  showToast(`✅ 「${name}」を追加しました`);
  setTimeout(()=>document.getElementById('new-cat-inp')?.focus(),50);
}

function deleteCat(i){
  const cats=STORE_CATEGORIES[currentStoreId];
  const name=cats[i];
  const inUse=allItems.some(it=>it.storeId===currentStoreId&&it.cat===name);
  if(!confirm(`「${name}」を削除しますか？${inUse?'\n\nこのカテゴリーを使用中の商品は最初のカテゴリーに変更されます。':''}`)) return;
  if(inUse){
    const fallback=cats[0]===name?(cats[1]||'その他'):cats[0];
    allItems.forEach(it=>{if(it.storeId===currentStoreId&&it.cat===name)it.cat=fallback;});
  }
  STORE_CATEGORIES[currentStoreId].splice(i,1);
  saveData(); renderCatModal();
  showToast(`🗑 「${name}」を削除しました`);
}

function editCat(i){
  const cats=STORE_CATEGORIES[currentStoreId];
  const oldName=cats[i];
  const newName=prompt(`カテゴリー名を変更してください`,oldName);
  if(!newName||newName===oldName) return;
  if(cats.includes(newName)){alert('同じ名前のカテゴリーが既にあります');return;}
  // 商品のカテゴリーも更新
  allItems.forEach(it=>{if(it.storeId===currentStoreId&&it.cat===oldName)it.cat=newName;});
  STORE_CATEGORIES[currentStoreId][i]=newName;
  saveData(); renderCatModal();
  showToast(`✅ 「${oldName}」→「${newName}」に変更しました`);
}

      </button>
      ${stores.map(s=>`
      <button class="btn btn-g" style="width:100%;height:44px;font-size:13px;justify-content:flex-start;gap:8px" onclick="doExport('${s.id}')">

function doExport(scope){
  if(scope===undefined) scope='all';
  const wb=XLSX.utils.book_new();
  const headers=['商品名','カテゴリ','現在庫','単位','仕入れ単価（円）','在庫金額（円）','状態','登録日時','更新日時'];
  const cols=[{wch:20},{wch:14},{wch:10},{wch:8},{wch:16},{wch:16},{wch:10},{wch:18},{wch:18}];
  const buildRows=sid=>{
    const items=allItems.filter(i=>i.storeId===sid).sort((a,b)=>(a.createdAt||'').localeCompare(b.createdAt||''));
    const rows=items.map(i=>[i.name,i.cat,i.qty,i.unit,i.price,parseFloat((i.qty*i.price).toFixed(2)),i.qty===0?'在庫切れ':'在庫あり',i.createdAt||'',i.updatedAt]);
    rows.push(['合計','','','','',parseFloat(items.reduce((s,i)=>s+i.qty*i.price,0).toFixed(2)),'','','']);
    return rows;
  };
  if(scope==='all'){
    stores.forEach(s=>{const ws=XLSX.utils.aoa_to_sheet([headers,...buildRows(s.id)]);ws['!cols']=cols;XLSX.utils.book_append_sheet(wb,ws,s.name.slice(0,28).replace(/[\/*?[\]:]/g,'_'));});
    const ws2=XLSX.utils.aoa_to_sheet([['店舗名','商品数','在庫切れ数','在庫総額（円）'],...stores.map(s=>{const it=allItems.filter(i=>i.storeId===s.id);return[s.name,it.length,it.filter(i=>i.qty===0).length,parseFloat(it.reduce((a,i)=>a+i.qty*i.price,0).toFixed(2))];})]);
    ws2['!cols']=[{wch:16},{wch:10},{wch:12},{wch:16}];XLSX.utils.book_append_sheet(wb,ws2,'サマリー');
  }else{
    const sid=parseInt(scope);
    const s=stores.find(s=>s.id===sid);
    const ws=XLSX.utils.aoa_to_sheet([headers,...buildRows(sid)]);ws['!cols']=cols;
    XLSX.utils.book_append_sheet(wb,ws,s?.name||'在庫');
  }
  XLSX.writeFile(wb,`在庫管理_${getFiscalLabel()}.xlsx`);closeModal();
}

async function saveEntryPw(){
  const pw=document.getElementById('entry-pw1')?.value.trim();
  const pw2=document.getElementById('entry-pw2')?.value.trim();
  if(!pw||pw.length<4){alert('パスワードは4文字以上で入力してください');return;}
  if(pw!==pw2){alert('パスワードが一致しません');return;}
  const h=await hashPw(pw);
  localStorage.setItem(ENTRY_PW_KEY,h);
  document.getElementById('entry-pw1').value='';
  document.getElementById('entry-pw2').value='';
  closeModal();
  showToast('✅ 入室パスワードを設定しました！');
}
function clearEntryPw(){
  if(!confirm('入室パスワードを解除します。誰でも開けるようになります。よろしいですか？'))return;
  localStorage.removeItem(ENTRY_PW_KEY);
  closeModal();
  showToast('✅ 入室パスワードを解除しました');
}

function resetAllQtyToZero(){
  const scope=document.getElementById('zero-scope')?.value||'all';
  const targetStores = scope==='all' ? stores.map(s=>s.id) : [parseInt(scope)];
  const targetNames = targetStores.map(id=>stores.find(s=>s.id===id)?.name||'').join('・');
  const targetItems = allItems.filter(i=>targetStores.includes(i.storeId)&&i.qty!==0);

  if(targetItems.length===0){
    showToast('ゼロでない在庫がありません。','#E24B4A');
    return;
  }

  if(!confirm(`【${targetNames}】の在庫数を全てゼロにします。\n\n対象：${targetItems.length}件\n\n先にExcelファイルで現在の在庫データを保存します。\nよろしいですか？`)) return;

  // ① まず現在データをExcelで保存
  try{
    const wb=XLSX.utils.book_new();
    const headers=['商品名','カテゴリ','現在庫','単位','仕入れ単価（円）','在庫金額（円）','状態','更新日時'];
    const cols=[{wch:22},{wch:14},{wch:10},{wch:8},{wch:16},{wch:16},{wch:10},{wch:18}];
    const now=nowStr();

    if(scope==='all'){
      stores.forEach(s=>{
        const items=allItems.filter(i=>i.storeId===s.id).sort((a,b)=>(a.createdAt||'').localeCompare(b.createdAt||''));
        const rows=items.map(i=>[i.name,i.cat,i.qty,i.unit,i.price,parseFloat((i.qty*i.price).toFixed(2)),i.qty===0?'在庫切れ':'在庫あり',i.updatedAt]);
        rows.push(['合計','','','','',parseFloat(items.reduce((s,i)=>s+i.qty*i.price,0).toFixed(2)),'','']);
        const ws=XLSX.utils.aoa_to_sheet([headers,...rows]);ws['!cols']=cols;
        XLSX.utils.book_append_sheet(wb,ws,s.name.slice(0,28).replace(/[\/*?\[\]:]/g,'_'));
      });
      // サマリーシート
      const ws2=XLSX.utils.aoa_to_sheet([
        ['店舗名','商品数','在庫切れ数','在庫総額（円）'],
        ...stores.map(s=>{const it=allItems.filter(i=>i.storeId===s.id);return[s.name,it.length,it.filter(i=>i.qty===0).length,parseFloat(it.reduce((a,i)=>a+i.qty*i.price,0).toFixed(2))];})
      ]);
      ws2['!cols']=[{wch:16},{wch:10},{wch:12},{wch:16}];
      XLSX.utils.book_append_sheet(wb,ws2,'サマリー');
    } else {
      const s=stores.find(s=>s.id===currentStoreId);
      const items=allItems.filter(i=>i.storeId===currentStoreId).sort((a,b)=>(a.createdAt||'').localeCompare(b.createdAt||''));
      const rows=items.map(i=>[i.name,i.cat,i.qty,i.unit,i.price,parseFloat((i.qty*i.price).toFixed(2)),i.qty===0?'在庫切れ':'在庫あり',i.updatedAt]);
      rows.push(['合計','','','','',parseFloat(items.reduce((s,i)=>s+i.qty*i.price,0).toFixed(2)),'','']);
      const ws=XLSX.utils.aoa_to_sheet([headers,...rows]);ws['!cols']=cols;
      XLSX.utils.book_append_sheet(wb,ws,s?.name||'在庫');
    }

    const time=new Date().toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'}).replace(/:/g,'');
    XLSX.writeFile(wb,`在庫ゼロリセット前_${getFiscalLabel()}_${time}.xlsx`);
  }catch(e){
    alert('Excelの保存に失敗しました：'+e.message+'\n\n在庫ゼロリセットを中止します。');
    return;
  }

  // ② ゼロリセット実行
  const resetNow=nowStr();
  targetItems.forEach(i=>{ i.qty=0; i.updatedAt=resetNow; });
  saveData();
  closeModal();
  render();
  updateStats();
  updateAllStoresTotal();
  showToast(`✅ ${targetItems.length}件の在庫をゼロにしました（Excel保存済み）`,'var(--r)');
}

  }catch(err){alert('バックアップの保存に失敗しました：'+err.message);}
}

// ============================================================
// 決算期ファイル名生成
// ============================================================
function getFiscalLabel(){
  const now = new Date();
  const y = now.getFullYear();
  const m = now.getMonth() + 1; // 1-12
  // 4月〜12月 → 翌年3月期　/ 1月〜3月 → 当年3月期
  const fiscalYear = m >= 4 ? y + 1 : y;
  const mm = String(now.getMonth() + 1).padStart(2,'0');
  const dd = String(now.getDate()).padStart(2,'0');
  return `${fiscalYear}年3月期_${y}${mm}${dd}`;
}

function backupToGdrive(){
  try{
    const data={stores,allItems,nextStoreId,nextItemId,categories:STORE_CATEGORIES,exportedAt:nowStr(),version:APP_VERSION};
    const json=JSON.stringify(data,null,2);
    const today=new Date().toLocaleDateString('ja-JP',{year:'numeric',month:'2-digit',day:'2-digit'}).replace(/\//g,'');
    const fileName='在庫バックアップ_'+today+'.txt';
    const blob=new Blob([json],{type:'text/plain'});
    // ダウンロードを確実に実行
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url; a.download=fileName; a.style.display='none';
    document.body.appendChild(a); a.click();
    setTimeout(()=>{ document.body.removeChild(a); URL.revokeObjectURL(url); },2000);

        </button>
        <div class="fa"><button class="btn btn-g" onclick="closeModal()">閉じる</button></div>`;

function importBackup(e){
  const file=e.target.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=ev=>{
    try{
      const d=JSON.parse(ev.target.result);
      if(!d.stores||!d.allItems){alert('有効なバックアップファイルではありません。');return;}
      if(!confirm(`バックアップ（${d.exportedAt||'日時不明'}）を復元しますか？\n現在のデータは上書きされます。`))return;
      stores=d.stores;allItems=d.allItems;
      if(d.nextStoreId)nextStoreId=d.nextStoreId;
      if(d.nextItemId)nextItemId=d.nextItemId;
      if(d.categories)STORE_CATEGORIES=d.categories;
      currentStoreId=stores[0]?.id||1;
      saveData();renderTabs();render();closeModal();
      showToast('✅ 復元が完了しました！');
    }catch(err){alert('ファイルの読み込みに失敗しました。');}
  };
  reader.readAsText(file);
}

function openLightbox(itemId){
  const item=allItems.find(i=>i.id==itemId);
  if(!item||!item.image) return;
  const lb=document.createElement('div');
  lb.className='lightbox';
  lb.innerHTML=`<button class="lightbox-close" onclick="this.parentElement.remove()">✕</button><img src="${item.image}" alt="${esc(item.name)}">`;
  lb.addEventListener('click',e=>{ if(e.target===lb) lb.remove(); });
  document.body.appendChild(lb);
}

// アクセスパスワードチェック（有効な場合のみ）
async function checkAccessPassword(){
  const enabled = localStorage.getItem(ACCESS_ENABLED_KEY)==='1';
  if(!enabled) return; // 無効なら何もしない
  const storedHash = localStorage.getItem(ACCESS_PW_KEY);
  if(!storedHash) return;
  // パスワード入力モーダルを表示
  document.getElementById('modal-content').innerHTML=`
    <h2>🔐 パスワードを入力</h2>
    <div style="font-size:13px;color:var(--tm);margin-bottom:16px">このアプリにアクセスするにはパスワードが必要です。</div>
    <div class="fr"><label>パスワード</label>
    <input type="password" id="access-pw-inp" placeholder="パスワード" style="text-align:center;letter-spacing:4px;font-size:18px" onkeydown="if(event.key==='Enter')verifyAccessPassword()"></div>
    <div id="access-pw-err" style="font-size:12px;color:var(--r);text-align:center;min-height:18px;margin-bottom:8px"></div>
    <div class="fa"><button class="btn btn-p" onclick="verifyAccessPassword()">入力</button></div>`;
  openOverlay();
  setTimeout(()=>document.getElementById('access-pw-inp')?.focus(),80);
}

async function verifyAccessPassword(){
  const input = document.getElementById('access-pw-inp').value;
  const inputHash = await hashPw(input);
  const storedHash = localStorage.getItem(ACCESS_PW_KEY);
  if(inputHash===storedHash){
    closeModal();
  } else {
    document.getElementById('access-pw-err').textContent='パスワードが違います。';
    document.getElementById('access-pw-inp').value='';
  }
}

// 2. DATA_VERSIONが変わっていたら安全にマイグレーション（ユーザーデータを保持）
const savedDV=localStorage.getItem(DATA_VER_KEY);
if(savedDV!==DATA_VERSION){
  // ユーザーが独自追加した商品（IDがNEXT_ITEM_ID以上）は必ず保持
  const userItems=allItems.filter(i=>i.id>=NEXT_ITEM_ID);
  // デフォルト商品は最新定義でマイグレーション（在庫数・価格・画像はユーザー入力値を維持）
  const mergedDefaults=DEFAULT_ITEMS.map(def=>{
    const existing=allItems.find(i=>i.id===def.id);
    if(existing){
      // qty・priceはDEFAULT_ITEMSの値を優先（ゼロリセット時などに反映させるため）
      return {...def, qty:def.qty, price:existing.price, image:existing.image||'',
              updatedAt:existing.updatedAt, createdAt:existing.createdAt||def.createdAt, done:existing.done||false};
    }
    return def;
  });
  allItems=[...mergedDefaults, ...userItems];
  localStorage.setItem(DATA_VER_KEY,DATA_VERSION);
  saveData();
}
